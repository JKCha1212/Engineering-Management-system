/* 제품 생성 */
function createProduct(){
  const code = document.getElementById('np-code').value.trim();
  const name = document.getElementById('np-name').value.trim();
  if(!code){ alert('제품 코드는 필수입니다.'); return; }

  const list = loadProductList();
  if(list.find(p=>p.id===code)){ alert(`"${code}" 코드가 이미 존재합니다.`); return; }

  const newProd = {
    id: code,
    code,
    name,
    desc: document.getElementById('np-desc').value.trim(),
    parentId: document.getElementById('np-parent').value || null,
    color: document.getElementById('np-color').value || '#1D9E75',
    createdAt: new Date().toISOString()
  };
  list.push(newProd);
  saveProductList(list);

  /* 빈 데이터 초기화 */
  saveProductData(code, emptyProductData());

  /* 폼 초기화 */
  ['np-code','np-name','np-desc'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('np-parent').value='';
  toggleAddProdForm();
  renderProductList();
  notify(`제품 "${code}" 추가됨`);
}

/* 제품 수정 */
function editProduct(id){
  const list = loadProductList();
  const prod = list.find(p=>p.id===id);
  if(!prod) return;
  const newCode = prompt('제품 코드:', prod.code);
  if(!newCode) return;
  const newName = prompt('제품명:', prod.name||'');
  const newDesc = prompt('설명:', prod.desc||'');
  prod.code = newCode.trim()||prod.code;
  prod.name = newName!==null ? newName.trim() : prod.name;
  prod.desc = newDesc!==null ? newDesc.trim() : prod.desc;
  saveProductList(list);
  if(id===currentProductId) updateProductDisplay();
  renderProductList();
  notify('제품 정보가 수정되었습니다');
}

/* 제품 삭제 */
function deleteProduct(id){
  if(id===currentProductId){ alert('현재 사용 중인 제품은 삭제할 수 없습니다.'); return; }
  const list = loadProductList();
  const prod = list.find(p=>p.id===id);
  if(!confirm(`"${prod?.code||id}" 제품과 모든 FMEA 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  const newList = list.filter(p=>p.id!==id);
  /* 자식 제품의 parentId 초기화 */
  newList.forEach(p=>{ if(p.parentId===id) p.parentId=null; });
  saveProductList(newList);
  localStorage.removeItem(PRODUCT_DATA_PREFIX+id);
  renderProductList();
  notify(`"${prod?.code||id}" 삭제됨`);
}

/* 제품 합치기 */
function mergeProducts(){
  const list = loadProductList();
  if(list.length<2){ alert('합칠 제품이 2개 이상 필요합니다.'); return; }

  const targetCode = prompt(
    '합칠 대상 제품 코드를 입력하세요 (새 코드):\n\n현재 제품 목록:\n' +
    list.map(p=>`  ${p.code}: ${p.name||''}`).join('\n')
  );
  if(!targetCode) return;

  /* 모든 제품 데이터 병합 */
  let mergedDIMS=[], mergedCRS=[], mergedFMS=[], mergedDB=[], mergedPARTS=[];
  const dimIds=new Set(), crIds=new Set(), fmIds=new Set();

  list.forEach(p=>{
    const data = loadProductData(p.id) || emptyProductData();
    data.DIMS.forEach(d=>{ if(!dimIds.has(d.id)){ dimIds.add(d.id); mergedDIMS.push(d); }});
    data.CRS.forEach(cr=>{ if(!crIds.has(cr.id)){ crIds.add(cr.id); mergedCRS.push(cr); }});
    data.FMS.forEach(fm=>{ if(!fmIds.has(fm.id)){ fmIds.add(fm.id); mergedFMS.push(fm); }});
    mergedDB.push(...data.DB);
    /* PARTS: 제품 코드를 prefix로 구분 */
    data.PARTS.forEach(pt=>{
      mergedPARTS.push({...pt, id:p.code+'_'+pt.id, label:p.code+' / '+pt.label});
    });
  });

  /* 중복 DB 행 제거 */
  const dbSeen = new Set();
  mergedDB = mergedDB.filter(r=>{
    const key=r.dimId+'|'+r.fId+'|'+r.crId;
    if(dbSeen.has(key)) return false;
    dbSeen.add(key); return true;
  });

  /* 새 제품으로 저장 */
  const merged = {
    id: targetCode, code: targetCode,
    name: '통합 FMEA — '+list.map(p=>p.code).join(' + '),
    desc: list.map(p=>p.code).join(', ')+' 통합본',
    parentId: null, color: '#1F3864',
    createdAt: new Date().toISOString()
  };
  const newList = [...list, merged];
  saveProductList(newList);
  saveProductData(targetCode, {
    DIMS:mergedDIMS, CRS:mergedCRS, FMS:mergedFMS, DB:mergedDB, PARTS:mergedPARTS
  });

  renderProductList();
  if(confirm(`통합 제품 "${targetCode}"이 생성됐습니다.\n지금 전환하시겠습니까?`)){
    switchProduct(targetCode);
  } else {
    notify(`"${targetCode}" 통합 완료 — ${mergedDB.length}건 연결`);
  }
}

/* ═══════════════════════════════════════════════════════════════
   FMEA 전체 뷰 — Occurrence / Detection / RPN / Actions
═══════════════════════════════════════════════════════════════ */
function getRPN(row){
  const fm = fmById(row.fmId);
  const sev = fm?.sev||0;
  const occ = row.occ||0;
  const det = row.det||0;
  return (sev&&occ&&det) ? {sev,occ,det,rpn:sev*occ*det} : {sev,occ,det,rpn:0};
}

function rpnBadge(rpn){
  if(!rpn) return `<span class="rpn-badge rpn-na">—</span>`;
  const c = rpn>=200?'rpn-hi':rpn>=100?'rpn-md':'rpn-lo';
  return `<span class="rpn-badge ${c}">${rpn}</span>`;
}
function odBadge(v, label){
  if(!v) return `<span class="occ-det-badge" style="color:var(--text3)">—</span>`;
  const c = v>=8?'od-hi':v>=5?'od-md':'od-lo';
  return `<span class="occ-det-badge ${c}">${v}</span>`;
}

function renderFMEATable(){
  const tbody  = document.getElementById('fmea-tbody');
  const stat   = document.getElementById('fmea-stat');
  const grpRow = document.getElementById('fmea-grp-row');
  const hdrRow = document.getElementById('fmea-hdr-row');
  const filterSel = document.getElementById('fmea-filter-part');
  const search = (document.getElementById('fmea-search')?.value||'').trim().toLowerCase();
  const rpnSort = document.getElementById('fmea-rpn-only')?.checked;
  if(!tbody) return;

  /* 부품 필터 갱신 */
  if(filterSel){
    const prev = filterSel.value;
    const partByLabel = {};
    PARTS.forEach(p=>{ partByLabel[p.label]=p; });
    const usedParts = [...new Set(DB.map(r=>{ const d=dimById(r.dimId); return d?.part||''; }).filter(Boolean))];
    filterSel.innerHTML = '<option value="">전체 부품</option>' +
      PARTS.filter(p=>usedParts.includes(p.label)).map(p=>`<option value="${p.id}">${p.label}</option>`).join('');
    filterSel.value = prev;
  }
  const filterPart = filterSel?.value||'';
  const partByLabel = {};
  PARTS.forEach(p=>{ partByLabel[p.label]=p; });

  /* 그룹 헤더 */
  grpRow.innerHTML = `
    <th class="fmea-grp-hdr grp-dim" colspan="4">치수 / 부품</th>
    <th class="fmea-grp-hdr grp-func" colspan="3">기능</th>
    <th class="fmea-grp-hdr grp-fm" colspan="3">Failure Mode</th>
    <th class="fmea-grp-hdr grp-rpn" colspan="4">Risk Assessment</th>
    <th class="fmea-grp-hdr grp-action" colspan="3">Actions</th>`;

  hdrRow.innerHTML = `
    <th>부품명</th><th>치수ID</th><th>치수명</th><th>공칭/공차</th>
    <th>기능명</th><th>기능유형</th><th>CR</th>
    <th>Failure Mode</th><th>FM유형</th><th>심각도<br>Sev</th>
    <th>발생도<br>Occ</th><th>검출도<br>Det</th><th>RPN</th><th>검출 방법</th>
    <th>예방 조치</th><th>시정 조치</th><th>중요도</th>`;

  /* 데이터 필터링 */
  let rows = DB.filter(r=>{
    const d = dimById(r.dimId);
    if(filterPart){
      const p = partByLabel[d?.part||''];
      if(!p || p.id !== filterPart) return false;
    }
    if(search){
      const fm = fmById(r.fmId);
      return (d?.name||'').toLowerCase().includes(search)||
             r.dimId.toLowerCase().includes(search)||
             r.fName.toLowerCase().includes(search)||
             r.crId.toLowerCase().includes(search)||
             (fm?.name||'').toLowerCase().includes(search)||
             (r.prevAction||'').toLowerCase().includes(search)||
             (r.corrAction||'').toLowerCase().includes(search)||
             (d?.part||'').toLowerCase().includes(search);
    }
    return true;
  });

  /* RPN 정렬 */
  if(rpnSort){
    rows = [...rows].sort((a,b)=>{
      const ra=getRPN(a).rpn||0, rb=getRPN(b).rpn||0;
      return rb-ra;
    });
  }

  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="17" style="text-align:center;padding:40px;color:var(--text3)">${search?`"${search}" 결과 없음`:'데이터 없음'}</td></tr>`;
    if(stat) stat.textContent='';
    return;
  }

  /* RPN 통계 */
  const rpns = rows.map(r=>getRPN(r).rpn).filter(Boolean);
  const hiCnt = rpns.filter(v=>v>=200).length;
  const mdCnt = rpns.filter(v=>v>=100&&v<200).length;

  let html='';
  rows.forEach((r,idx)=>{
    const d   = dimById(r.dimId);
    const fm  = fmById(r.fmId);
    const cr  = crById(r.crId);
    const {sev,occ,det,rpn} = getRPN(r);
    const rpnC = rpn>=200?'rpn-hi':rpn>=100?'rpn-md':rpn>0?'rpn-lo':'rpn-na';
    const odC  = (v)=>v>=8?'od-hi':v>=5?'od-md':v>0?'od-lo':'';
    const spec = d?`${fmt(d.nom)} +${fmt(d.tolP)}/-${fmt(d.tolM)} ${d.unit}`:'';
    const part = d?.part||'—';

    /* 인라인 편집 가능한 셀 (Occ/Det/Actions) */
    html += `<tr id="fmea-row-${idx}">
      <td style="font-size:11px">${part}</td>
      <td style="font-family:var(--font-mono);font-size:10px;color:var(--teal)">${r.dimId}</td>
      <td style="font-size:11px">${d?.name||r.dimId}</td>
      <td style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">${spec}</td>
      <td style="font-size:11px;font-weight:500">${r.fName}</td>
      <td style="font-size:10px;color:var(--text3)">${r.fType||'—'}</td>
      <td><span style="font-size:10px;font-family:var(--font-mono);color:var(--purple)">${r.crId}</span></td>
      <td style="font-size:11px;color:var(--red2)">${fm?.name||'—'}</td>
      <td style="font-size:10px;color:var(--text3)">${fm?.type||'—'}</td>
      <td style="text-align:center">${odBadge(sev)}</td>
      <td style="text-align:center" id="fmea-occ-${idx}">
        <input class="num-input" value="${occ||''}" placeholder="—"
          onchange="fmeaUpdateField(${DB.indexOf(r)},'occ',this.value)"
          onfocus="this.select()" style="width:42px">
      </td>
      <td style="text-align:center" id="fmea-det-${idx}">
        <input class="num-input" value="${det||''}" placeholder="—"
          onchange="fmeaUpdateField(${DB.indexOf(r)},'det',this.value)"
          onfocus="this.select()" style="width:42px">
      </td>
      <td style="text-align:center" id="fmea-rpn-${idx}">${rpnBadge(rpn)}</td>
      <td><input class="action-input" value="${r.detMethod||''}" placeholder="검출 방법 입력"
          onchange="fmeaUpdateField(${DB.indexOf(r)},'detMethod',this.value)"
          style="min-width:100px"></td>
      <td><input class="action-input" value="${r.prevAction||''}" placeholder="예방 조치 입력"
          onchange="fmeaUpdateField(${DB.indexOf(r)},'prevAction',this.value)"
          style="min-width:120px"></td>
      <td><input class="action-input" value="${r.corrAction||''}" placeholder="시정 조치 입력"
          onchange="fmeaUpdateField(${DB.indexOf(r)},'corrAction',this.value)"
          style="min-width:120px"></td>
      <td>${ib(r.imp)}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
  if(stat) stat.textContent = `${rows.length}건 | RPN 고위험(≥200): ${hiCnt}건 / 중위험(≥100): ${mdCnt}건`;
}

/* FMEA 테이블 셀 직접 업데이트 */
function fmeaUpdateField(dbIdx, field, value){
  if(dbIdx<0||dbIdx>=DB.length) return;
  if(field==='occ'||field==='det'){
    const v = parseInt(value)||0;
    DB[dbIdx][field] = (v>=1&&v<=10) ? v : undefined;
  } else {
    DB[dbIdx][field] = value.trim()||undefined;
  }
  /* RPN 셀 즉시 갱신 (테이블 전체 리렌더 없이) */
  const rowIdx = [...document.querySelectorAll('#fmea-tbody tr')].findIndex(
    tr=>tr.querySelector(`[onchange*="fmeaUpdateField(${dbIdx},"]`)
  );
  const {sev,occ,det,rpn} = getRPN(DB[dbIdx]);
  const rpnCell = document.querySelector(`#fmea-tbody tr:nth-child(${rowIdx+1}) td:nth-child(13)`);
  if(rpnCell) rpnCell.innerHTML = rpnBadge(rpn);
  saveToStorage();
  renderCETree();
}

/* CSV 내보내기 */
function exportFMEACSV(){
  const prod = getProductById(currentProductId);
  const headers = ['부품명','치수ID','치수명','공칭/공차','기능명','기능유형','CR',
    'Failure Mode','FM유형','심각도(Sev)','발생도(Occ)','검출도(Det)','RPN',
    '검출방법','예방조치','시정조치','중요도'];
  const rows = DB.map(r=>{
    const d=dimById(r.dimId); const fm=fmById(r.fmId);
    const {sev,occ,det,rpn}=getRPN(r);
    const spec=d?`${fmt(d.nom)} +${fmt(d.tolP)}/-${fmt(d.tolM)} ${d.unit}`:'';
    return [d?.part||'',r.dimId,d?.name||'',spec,r.fName,r.fType||'',r.crId,
      fm?.name||'',fm?.type||'',sev||'',occ||'',det||'',rpn||'',
      r.detMethod||'',r.prevAction||'',r.corrAction||'',r.imp
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10);
  const code = prod?.code||currentProductId;
  a.download = `FMEA_${code}_${date}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  notify(`FMEA_${code} CSV 내보내기 완료`);
}

/* ═══════════════════════════════════════════════════════════════
   STORAGE — localStorage 자동저장 + JSON 내보내기/가져오기
═══════════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'fmea_data_v1';

function saveToStorage(){
  /* requestAnimationFrame 이후 실행 → DOM repaint 먼저, 저장 나중 */
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      try {
        const data = { DIMS, CRS, FMS, DB, PARTS, savedAt: new Date().toISOString() };
        /* 제품별 키로 저장 */
        localStorage.setItem(PRODUCT_DATA_PREFIX + currentProductId, JSON.stringify(data));
        /* 호환성: 기존 키에도 저장 */
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        const st = document.getElementById('save-status');
        if(st){
          const t = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
          st.textContent = '저장됨 ' + t;
          setTimeout(()=>{ st.textContent=''; }, 3000);
        }
      } catch(e) { console.warn('localStorage 저장 실패:', e); }
    }, 0);
  });
}

function loadFromStorage(){
  try {
    /* 제품별 키 우선, 없으면 기존 키 */
    const prodRaw = localStorage.getItem(PRODUCT_DATA_PREFIX + currentProductId);
    const raw = prodRaw || localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(data.DIMS)  DIMS  = data.DIMS;
    if(data.CRS)   CRS   = data.CRS;
    if(data.FMS)   FMS   = data.FMS;
    if(data.DB)    DB    = data.DB;
    if(data.PARTS) PARTS = data.PARTS;
    return true;
  } catch(e) { console.warn('localStorage 로드 실패:', e); return false; }
}

function exportJSON(){
  const prod = getProductById(currentProductId);
  const data = { DIMS, CRS, FMS, DB, PARTS,
    product: prod,
    exportedAt: new Date().toISOString(), version: 2 };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10);
  const code = prod?.code || currentProductId;
  a.download = `FMEA_${code}_${date}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  notify(`FMEA_${code} 내보내기 완료`);
}

function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const hasDims = Array.isArray(data.DIMS) && data.DIMS.length > 0;
      const hasCRS  = Array.isArray(data.CRS)  && data.CRS.length  > 0;
      const hasFMS  = Array.isArray(data.FMS)  && data.FMS.length  > 0;
      const hasDB   = Array.isArray(data.DB)   && data.DB.length   > 0;
      if(!hasDims && !hasCRS && !hasFMS && !hasDB){
        alert('유효한 FMEA 데이터 파일이 아닙니다.'); return;
      }
      const prodInfo = data.product ? `제품: ${data.product.code} — ${data.product.name||''}\n` : '';
      if(!confirm(`${prodInfo}파일을 가져오면 현재 데이터가 교체됩니다.\n\n치수: ${data.DIMS?.length||0}개 · CR: ${data.CRS?.length||0}개 · FM: ${data.FMS?.length||0}개 · 연결: ${data.DB?.length||0}건 · 부품: ${data.PARTS?.length||0}개\n\n계속하시겠습니까?`)) return;
      if(data.DIMS)  DIMS  = data.DIMS;
      if(data.CRS)   CRS   = data.CRS;
      if(data.FMS)   FMS   = data.FMS;
      if(data.DB)    DB    = data.DB;
      if(data.PARTS) PARTS = data.PARTS;
      /* 가져온 파일의 제품 정보가 있으면 현재 제품에 반영 */
      if(data.product && data.product.code){
        const list = loadProductList();
        const existing = list.find(p=>p.id===currentProductId);
        if(existing && !existing.name && data.product.name){
          existing.name = data.product.name;
          existing.desc = data.product.desc||existing.desc;
          saveProductList(list);
          updateProductDisplay();
        }
      }
      selectedPart = null; selectedNode = null;
      ceCollapsed.clear();
      buildPartTree(); rebuildSelects();
      saveToStorage();
      notify(`가져오기 완료 — 연결 ${DB.length}건`);
    } catch(err) { alert('파일을 읽는 중 오류가 발생했습니다: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}
