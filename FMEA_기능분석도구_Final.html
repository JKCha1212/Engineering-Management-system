<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMEA 기능 분석 도구</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --font-ui: 'IBM Plex Sans KR', 'Malgun Gothic', sans-serif;
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  --bg:       #F7F6F3;
  --bg2:      #EEECEA;
  --bg3:      #E4E2DE;
  --surface:  #FFFFFF;
  --border:   rgba(0,0,0,.10);
  --border2:  rgba(0,0,0,.16);
  --text:     #1C1B19;
  --text2:    #5C5A56;
  --text3:    #9A9894;
  --teal:     #0F6E56;
  --teal2:    #1D9E75;
  --teal-bg:  #E1F5EE;
  --blue:     #185FA5;
  --blue2:    #378ADD;
  --blue-bg:  #E6F1FB;
  --purple:   #3C3489;
  --purple2:  #7F77DD;
  --purple-bg:#EEEDFE;
  --red:      #A32D2D;
  --red2:     #E24B4A;
  --red-bg:   #FCEBEB;
  --amber:    #633806;
  --amber2:   #EF9F27;
  --amber-bg: #FAEEDA;
  --shadow:   0 1px 3px rgba(0,0,0,.08), 0 0 0 .5px rgba(0,0,0,.06);
}

[data-theme="dark"] {
  --bg:       #141412;
  --bg2:      #1E1D1A;
  --bg3:      #2A2926;
  --surface:  #232220;
  --border:   rgba(255,255,255,.10);
  --border2:  rgba(255,255,255,.18);
  --text:     #E8E6E1;
  --text2:    #A8A6A0;
  --text3:    #6A6864;
  --teal:     #5DCAA5;
  --teal2:    #9FE1CB;
  --teal-bg:  #04342C;
  --blue:     #85B7EB;
  --blue2:    #B5D4F4;
  --blue-bg:  #042C53;
  --purple:   #AFA9EC;
  --purple2:  #CECBF6;
  --purple-bg:#26215C;
  --red:      #F09595;
  --red2:     #F7C1C1;
  --red-bg:   #501313;
  --amber:    #FAC775;
  --amber2:   #EF9F27;
  --amber-bg: #412402;
  --shadow:   0 1px 3px rgba(0,0,0,.3), 0 0 0 .5px rgba(255,255,255,.04);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
#app { display:flex; flex-direction:column; height:100vh; }

header {
  display:flex; align-items:center; gap:12px;
  padding:0 16px; height:48px;
  background:var(--surface);
  border-bottom:.5px solid var(--border2);
  flex-shrink:0; z-index:10;
}
.logo {
  display:flex; align-items:center; gap:8px;
  font-size:14px; font-weight:600; color:var(--text);
  letter-spacing:-.02em;
}
.logo-mark {
  width:26px; height:26px; border-radius:6px;
  background:var(--teal2); display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:#fff; font-family:var(--font-mono);
}
.header-tabs {
  display:flex; gap:2px; margin-left:8px;
  background:var(--bg2); border-radius:8px; padding:3px;
}
.htab {
  padding:4px 12px; border:none; background:none; cursor:pointer;
  font:inherit; font-size:12px; color:var(--text2); border-radius:6px;
  transition:all .15s; white-space:nowrap;
}
.htab:hover { color:var(--text); background:var(--bg3); }
.htab.active { background:var(--surface); color:var(--teal); font-weight:500; box-shadow:var(--shadow); }
.header-spacer { flex:1; }
.theme-btn {
  width:32px; height:32px; border:none; background:var(--bg2);
  border-radius:8px; cursor:pointer; color:var(--text2); font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.theme-btn:hover { background:var(--bg3); color:var(--text); }

.main { flex:1; display:flex; overflow:hidden; }

/* ── Left sidebar (parts tree) ── */
#sidebar {
  width:220px; min-width:220px;
  background:var(--surface);
  border-right:.5px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.sidebar-header {
  padding:10px 12px 8px;
  font-size:10px; font-weight:600; color:var(--text3);
  text-transform:uppercase; letter-spacing:.06em;
  border-bottom:.5px solid var(--border); flex-shrink:0;
}
#part-tree { flex:1; overflow-y:auto; padding:4px 0; }
.tree-node {
  display:flex; align-items:center; gap:6px;
  padding:5px 10px; cursor:pointer; user-select:none;
  border-left:2px solid transparent;
  transition:all .12s; position:relative;
}
.tree-node:hover { background:var(--bg2); }
.tree-node.active { background:var(--teal-bg); border-left-color:var(--teal2); }
.tree-node.active .tn-label { color:var(--teal); font-weight:500; }
.tn-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tn-label { font-size:12px; color:var(--text); }
.tn-count {
  margin-left:auto; font-size:10px; color:var(--text3);
  background:var(--bg2); padding:1px 5px; border-radius:99px;
}
.tree-node.active .tn-count { background:var(--teal2); color:#fff; }
.tree-dim {
  padding:3px 10px 3px 24px; cursor:pointer;
  font-size:10px; color:var(--text3);
  transition:all .12s;
}
.tree-dim:hover { color:var(--text2); }

/* ── Right content area ── */
#content { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* ── Canvas panel (cause-effect tree) ── */
#canvas-panel { flex:1; position:relative; overflow:hidden; }
canvas { display:block; }

/* ── Detail panel ── */
#detail-panel {
  height:200px; flex-shrink:0;
  background:var(--surface); border-top:.5px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.detail-tabs {
  display:flex; gap:0; border-bottom:.5px solid var(--border);
  padding:0 12px; flex-shrink:0;
}
.dtab {
  padding:7px 12px; border:none; background:none; cursor:pointer;
  font:inherit; font-size:11px; color:var(--text2);
  border-bottom:2px solid transparent; transition:all .13s;
  white-space:nowrap;
}
.dtab:hover { color:var(--text); }
.dtab.active { color:var(--teal); border-bottom-color:var(--teal2); font-weight:500; }
#detail-content { flex:1; overflow-y:auto; padding:10px 14px; }

/* ── Lookup panel (full panel tabs) ── */
.lookup-panel { flex:1; display:none; flex-direction:column; overflow:hidden; padding:16px; }
.lookup-panel.active { display:flex; }
.lp-search { display:flex; gap:8px; margin-bottom:14px; }
.lp-search select, .lp-search input { height:34px; font:inherit; font-size:12px; flex:1; }
.lp-search button {
  height:34px; padding:0 14px; font:inherit; font-size:12px;
  background:var(--teal2); color:#fff; border:none; border-radius:6px;
  cursor:pointer; white-space:nowrap;
}
.lp-search button:hover { background:var(--teal); }
.info-card {
  background:var(--bg2); border-radius:8px; padding:12px 14px; margin-bottom:12px;
}
.info-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px;
}
.info-item { display:flex; flex-direction:column; gap:2px; }
.info-lbl { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; }
.info-val { font-size:12px; font-weight:500; }
.spec-val { font-family:var(--font-mono); font-size:12px; color:var(--teal); font-weight:500; }
.result-table { width:100%; border-collapse:collapse; font-size:12px; }
.result-table th {
  padding:6px 10px; text-align:left;
  background:var(--bg2); border-bottom:.5px solid var(--border);
  font-weight:500; color:var(--text2); white-space:nowrap; font-size:11px;
}
.result-table td {
  padding:6px 10px; border-bottom:.5px solid var(--border);
  vertical-align:middle;
}
.result-table tr:last-child td { border-bottom:none; }
.result-table tbody tr:hover td { background:var(--bg2); }
.section-label {
  font-size:10px; font-weight:600; color:var(--text3);
  text-transform:uppercase; letter-spacing:.06em;
  margin:12px 0 6px;
}
.empty { text-align:center; padding:40px; color:var(--text3); font-size:13px; }
.chip {
  display:inline-flex; align-items:center; padding:2px 7px;
  border-radius:99px; font-size:10px; font-weight:500;
  white-space:nowrap; cursor:pointer; transition:all .12s;
}
.chip-dim { background:var(--teal-bg); color:var(--teal); border:.5px solid var(--teal2); }
.chip-dim:hover { background:var(--teal2); color:#fff; }
.chip-cr  { background:var(--purple-bg); color:var(--purple); border:.5px solid var(--purple2); }
.chip-cr:hover { background:var(--purple2); color:#fff; }
.chip-fm  { background:var(--red-bg); color:var(--red); border:.5px solid var(--red2); }
.chip-fm:hover { background:var(--red2); color:#fff; }
.badge {
  display:inline-flex; align-items:center; padding:2px 6px;
  border-radius:99px; font-size:10px; font-weight:500; white-space:nowrap;
}
.b-필수 { background:var(--red-bg); color:var(--red); }
.b-중요 { background:var(--amber-bg); color:var(--amber); }
.b-보통 { background:var(--bg3); color:var(--text2); }
.sev-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:4px; font-size:11px; font-weight:600;
  font-family:var(--font-mono);
}
.sev-hi { background:var(--red-bg); color:var(--red); }
.sev-md { background:var(--amber-bg); color:var(--amber); }
.sev-lo { background:var(--teal-bg); color:var(--teal); }

/* ── DB Management ── */
.db-panel { flex:1; display:none; flex-direction:column; overflow:hidden; }
.db-panel.active { display:flex; }
.db-subtabs {
  display:flex; gap:4px; padding:12px 16px 0; flex-shrink:0;
  border-bottom:.5px solid var(--border);
}
.dstab {
  padding:6px 14px; border:none; background:none; cursor:pointer;
  font:inherit; font-size:12px; color:var(--text2);
  border-bottom:2px solid transparent; transition:all .13s;
}
.dstab:hover { color:var(--text); }
.dstab.active { color:var(--teal); border-bottom-color:var(--teal2); font-weight:500; }
.db-sub-content { flex:1; overflow-y:auto; padding:14px 16px; }
.add-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px; font:inherit; font-size:12px;
  background:none; border:.5px solid var(--teal2); color:var(--teal);
  border-radius:6px; cursor:pointer; margin-bottom:12px;
}
.add-btn:hover { background:var(--teal-bg); }
.form-card {
  background:var(--surface); border:.5px solid var(--border);
  border-radius:8px; padding:14px; margin-bottom:12px;
}
.fg { display:flex; flex-direction:column; gap:3px; }
.fg label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; }
.fg input, .fg select, .fg textarea {
  font:inherit; font-size:12px; padding:6px 8px;
  background:var(--bg2); border:.5px solid var(--border);
  border-radius:6px; color:var(--text); outline:none;
  transition:border-color .13s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus {
  border-color:var(--teal2);
}
.fg textarea { height:52px; resize:none; }
.fgrid { display:grid; gap:8px; margin-bottom:8px; }
.g2 { grid-template-columns:1fr 1fr; }
.g3 { grid-template-columns:1fr 1fr 1fr; }
.g4 { grid-template-columns:1fr 1fr 1fr 1fr; }
.ro { opacity:.7; cursor:default !important; }
.form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:10px; }
.btn-save {
  padding:6px 16px; font:inherit; font-size:12px;
  background:var(--teal2); color:#fff; border:none; border-radius:6px; cursor:pointer;
}
.btn-save:hover { background:var(--teal); }
.btn-cancel {
  padding:6px 16px; font:inherit; font-size:12px;
  background:none; border:.5px solid var(--border2); border-radius:6px; cursor:pointer;
  color:var(--text2);
}
.btn-cancel:hover { background:var(--bg2); }
.del-btn {
  background:none; border:none; color:var(--red2); cursor:pointer;
  font-size:12px; padding:2px 5px; border-radius:4px; opacity:.5;
}
.del-btn:hover { opacity:1; background:var(--red-bg); }
.edit-btn {
  background:none; border:none; color:var(--blue2); cursor:pointer;
  font-size:12px; padding:2px 5px; border-radius:4px; opacity:.5;
}
.edit-btn:hover { opacity:1; background:var(--blue-bg); }
.row-edit-form {
  background:var(--bg2); border-top:.5px solid var(--border);
  border-bottom:.5px solid var(--border);
}
.row-edit-form td { padding:10px 10px 12px; }
.inline-input {
  font:inherit; font-size:12px; padding:4px 7px;
  background:var(--surface); border:.5px solid var(--border2);
  border-radius:5px; color:var(--text); outline:none; width:100%;
}
.inline-input:focus { border-color:var(--teal2); }
.inline-select {
  font:inherit; font-size:12px; padding:4px 7px;
  background:var(--surface); border:.5px solid var(--border2);
  border-radius:5px; color:var(--text); outline:none; width:100%;
}
.btn-update {
  padding:4px 12px; font:inherit; font-size:11px;
  background:var(--blue2); color:#fff; border:none; border-radius:5px; cursor:pointer;
}
.btn-update:hover { background:var(--blue); }
.btn-editcancel {
  padding:4px 10px; font:inherit; font-size:11px;
  background:none; border:.5px solid var(--border2); border-radius:5px; cursor:pointer; color:var(--text2);
}
.btn-editcancel:hover { background:var(--bg3); }
.stat-row {
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px;
}
.stat-box { background:var(--bg2); border-radius:8px; padding:10px; text-align:center; }
.stat-n { font-size:22px; font-weight:600; font-family:var(--font-mono); margin-bottom:2px; }
.stat-l { font-size:10px; color:var(--text3); }



/* ── Cause & Effect Tree (HTML 기반) ── */
#ce-toolbar {
  display:flex; align-items:center; gap:10px; padding:6px 12px;
  background:var(--surface); border-bottom:.5px solid var(--border);
  flex-shrink:0;
}
#ce-toolbar input, #ce-toolbar select {
  font:inherit; padding:4px 8px; background:var(--bg2);
  border:.5px solid var(--border2); border-radius:5px; color:var(--text);
  outline:none;
}
#ce-toolbar input:focus { border-color:var(--teal2); }
#ce-stat { font-size:11px; color:var(--text3); }
#ce-body {
  flex:1; overflow:auto; position:relative;
}
#ce-cols {
  position:sticky; top:0; z-index:10;
  background:var(--surface); border-bottom:.5px solid var(--border2);
  height:28px; display:flex;
}
.ce-col-hdr {
  position:absolute; top:0; height:28px;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:500; color:var(--text3);
  text-transform:uppercase; letter-spacing:.05em;
  border-right:.5px solid var(--border);
}
.ce-col-hdr:last-child { border-right:none; }
#ce-content {
  padding:10px 0 20px;
  min-width:740px;
}

/* part section */
.ce-part-section { margin-bottom:6px; }
.ce-part-label {
  display:flex; align-items:center; gap:7px;
  padding:5px 10px; font-size:11px; font-weight:500;
  color:var(--text2); cursor:pointer; user-select:none;
  border-bottom:.5px solid var(--border);
  position:sticky; top:28px; z-index:5; background:var(--bg2);
}
.ce-part-label:hover { background:var(--bg3); }
.ce-part-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.ce-part-arrow { font-size:9px; color:var(--text3); transition:transform .15s; }
.ce-part-arrow.open { transform:rotate(90deg); }
.ce-part-cnt { font-size:9px; color:var(--text3); background:var(--bg3); padding:1px 6px; border-radius:99px; }

/* row */
.ce-row {
  display:flex; align-items:stretch; min-height:38px;
  border-bottom:.5px solid var(--border); position:relative;
}
.ce-row:hover { background:var(--bg2); }
.ce-row.highlighted { background:var(--teal-bg); }

/* cells */
.ce-cell {
  flex-shrink:0; padding:5px 8px;
  display:flex; align-items:center;
  border-right:.5px solid var(--border);
  position:relative;
}
.ce-cell:last-child { border-right:none; }
.ce-cell-dim   { width:160px; flex-direction:column; align-items:flex-start; gap:2px; }
.ce-cell-func  { width:180px; }
.ce-cell-cr    { width:200px; flex-direction:column; align-items:flex-start; gap:2px; }
.ce-cell-fm    { width:160px; }

/* dim cell content */
.ce-dim-id   { font-size:9px; font-family:var(--font-mono); color:var(--teal); background:var(--teal-bg); padding:1px 5px; border-radius:3px; }
.ce-dim-name { font-size:11px; font-weight:500; }
.ce-dim-spec { font-size:9px; font-family:var(--font-mono); color:var(--text3); }

/* func cell */
.ce-func-box {
  width:100%; padding:4px 7px; border-radius:4px; cursor:pointer;
  transition:background .12s; font-size:11px;
}
.ce-func-box:hover { background:var(--blue-bg); }
.ce-func-name { font-weight:500; font-size:11px; line-height:1.4; }
.ce-func-type { font-size:9px; color:var(--text3); }

/* cr cell */
.ce-cr-id   { font-size:9px; font-family:var(--font-mono); color:var(--purple); background:var(--purple-bg); padding:1px 5px; border-radius:3px; cursor:pointer; }
.ce-cr-desc { font-size:10px; color:var(--text2); line-height:1.35; }
.ce-cr-imp  { font-size:9px; }

/* fm cell */
.ce-fm-box {
  width:100%; padding:4px 7px; border-radius:4px; cursor:pointer;
  font-size:11px; transition:background .12s;
}
.ce-fm-box:hover { background:var(--red-bg); }
.ce-fm-id   { font-size:9px; font-family:var(--font-mono); color:var(--red); }
.ce-fm-name { font-weight:500; font-size:11px; }
.ce-fm-sev  { font-size:9px; }

/* connector line between cells */
.ce-connector {
  position:absolute; top:50%; width:10px; height:1px;
  background:var(--border2); pointer-events:none;
}

/* empty state */
.ce-empty {
  padding:60px 20px; text-align:center; color:var(--text3); font-size:13px;
}

/* highlight for search */
.ce-highlight { background:rgba(239,159,39,.25); border-radius:2px; }


/* ── 제품 선택기 ── */
#product-selector {
  display:flex; align-items:center; gap:6px;
  padding:0 10px; border-right:.5px solid var(--border);
  margin-right:4px; flex-shrink:0;
}
#product-name-display {
  font-size:12px; font-weight:500; color:var(--text);
  max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  cursor:pointer; padding:3px 7px;
  border:.5px solid var(--border2); border-radius:5px;
  background:var(--bg2); transition:all .12s;
}
#product-name-display:hover { background:var(--bg3); border-color:var(--teal2); }
.prod-badge {
  font-size:9px; font-weight:600; padding:2px 6px; border-radius:3px;
  background:var(--teal2); color:#fff; white-space:nowrap;
}

/* ── 제품 관리 모달 ── */
#product-modal-bg {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.45);
}
#product-modal-bg.open { display:flex; align-items:center; justify-content:center; }
#product-modal {
  background:var(--surface); border-radius:var(--border-radius-lg);
  border:.5px solid var(--border2); width:520px; max-height:80vh;
  display:flex; flex-direction:column; overflow:hidden;
}
#product-modal-header {
  display:flex; align-items:center; padding:14px 18px;
  border-bottom:.5px solid var(--border); flex-shrink:0;
}
#product-modal-header h2 { font-size:14px; font-weight:500; flex:1; }
.pm-close { background:none; border:none; cursor:pointer; color:var(--text3); font-size:18px; }
#product-modal-body { overflow-y:auto; padding:14px 18px; flex:1; }
#product-modal-footer {
  padding:12px 18px; border-top:.5px solid var(--border);
  display:flex; gap:8px; flex-shrink:0;
}

.prod-item {
  display:flex; align-items:center; gap:8px; padding:9px 10px;
  border:.5px solid var(--border); border-radius:8px; margin-bottom:6px;
  cursor:pointer; transition:all .13s;
}
.prod-item:hover { background:var(--bg2); }
.prod-item.active { border-color:var(--teal2); background:var(--teal-bg); }
.prod-item-icon {
  width:32px; height:32px; border-radius:6px; display:flex; align-items:center;
  justify-content:center; font-size:11px; font-weight:600; color:#fff; flex-shrink:0;
}
.prod-item-info { flex:1; min-width:0; }
.prod-item-name { font-size:12px; font-weight:500; }
.prod-item-meta { font-size:10px; color:var(--text3); margin-top:1px; }
.prod-item-actions { display:flex; gap:4px; flex-shrink:0; }
.prod-act-btn {
  background:none; border:.5px solid var(--border2); border-radius:4px;
  padding:3px 7px; font-size:10px; cursor:pointer; color:var(--text2);
  transition:all .12s;
}
.prod-act-btn:hover { background:var(--bg3); }
.prod-act-btn.danger:hover { background:var(--red-bg); color:var(--red); border-color:var(--red2); }

/* 새 제품 추가 폼 */
#add-prod-form { 
  background:var(--bg2); border-radius:8px; padding:12px; margin-top:8px;
  border:.5px solid var(--border);
}
.pm-fg { display:flex; flex-direction:column; gap:3px; margin-bottom:8px; }
.pm-fg label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; }
.pm-fg input, .pm-fg select, .pm-fg textarea {
  font:inherit; font-size:12px; padding:6px 9px;
  background:var(--surface); border:.5px solid var(--border2);
  border-radius:5px; color:var(--text); outline:none;
}
.pm-fg input:focus, .pm-fg select:focus { border-color:var(--teal2); }
.pm-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.pm-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
.btn-pm-save { padding:6px 16px; font:inherit; font-size:12px; background:var(--teal2); color:#fff; border:none; border-radius:5px; cursor:pointer; }
.btn-pm-save:hover { background:var(--teal); }
.btn-pm-cancel { padding:6px 12px; font:inherit; font-size:12px; background:none; border:.5px solid var(--border2); border-radius:5px; cursor:pointer; color:var(--text2); }

/* 색상 팔레트 */
.color-palette { display:flex; gap:6px; flex-wrap:wrap; }
.color-swatch {
  width:22px; height:22px; border-radius:4px; cursor:pointer;
  border:2px solid transparent; transition:all .12s;
}
.color-swatch.selected { border-color:var(--text); transform:scale(1.1); }


/* ── RPN / Occurrence / Detection ── */
.rpn-badge {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:36px; height:22px; border-radius:4px;
  font-size:11px; font-weight:600; font-family:var(--font-mono);
  padding:0 5px;
}
.rpn-hi  { background:#FCEBEB; color:#A32D2D; }
.rpn-md  { background:#FAEEDA; color:#633806; }
.rpn-lo  { background:#E1F5EE; color:#0F6E56; }
.rpn-na  { background:var(--bg3); color:var(--text3); }

.occ-det-badge {
  display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:3px;
  font-size:10px; font-weight:500; font-family:var(--font-mono);
}
.od-hi { background:#FCE4D6; color:#993C1D; }
.od-md { background:#FFF2CC; color:#633806; }
.od-lo { background:#E2EFDA; color:#375623; }

/* RPN 컬럼 */
.ce-cell-rpn  { width:120px; flex-direction:column; align-items:flex-start; gap:3px; }
.ce-rpn-row   { display:flex; align-items:center; gap:5px; font-size:10px; }
.ce-rpn-label { color:var(--text3); width:28px; flex-shrink:0; }

/* FMEA 전체 뷰 탭 */
#tab-fmea { flex:1; display:none; flex-direction:column; overflow:hidden; }
#tab-fmea.active { display:flex; }
#fmea-toolbar {
  display:flex; align-items:center; gap:10px; padding:6px 12px;
  background:var(--surface); border-bottom:.5px solid var(--border); flex-shrink:0;
}
#fmea-toolbar input, #fmea-toolbar select {
  font:inherit; font-size:11px; padding:4px 8px;
  background:var(--bg2); border:.5px solid var(--border2);
  border-radius:5px; color:var(--text); outline:none; height:28px;
}
#fmea-toolbar input:focus { border-color:var(--teal2); }
#fmea-body { flex:1; overflow:auto; }

/* FMEA 테이블 */
.fmea-table { width:100%; border-collapse:collapse; font-size:11px; min-width:1400px; }
.fmea-table th {
  padding:6px 8px; text-align:center; font-size:10px; font-weight:500;
  color:var(--text3); white-space:nowrap; border-bottom:.5px solid var(--border2);
  border-right:.5px solid var(--border); position:sticky; top:0; z-index:5;
  background:var(--surface);
}
.fmea-table td {
  padding:5px 8px; border-bottom:.5px solid var(--border);
  border-right:.5px solid var(--border); vertical-align:middle;
}
.fmea-table tr:hover td { background:var(--bg2); }
.fmea-table th:last-child, .fmea-table td:last-child { border-right:none; }

/* 열 그룹 헤더 */
.fmea-grp-hdr {
  padding:4px 8px; text-align:center; font-size:10px; font-weight:600;
  letter-spacing:.04em; text-transform:uppercase; color:#fff;
  border-right:.5px solid rgba(255,255,255,.3);
}
.grp-dim    { background:#185FA5; }
.grp-func   { background:#1D9E75; }
.grp-fm     { background:#A32D2D; }
.grp-rpn    { background:#633806; }
.grp-action { background:#534AB7; }

/* 인라인 편집 (숫자 입력) */
.num-input {
  width:46px; font:inherit; font-size:11px; text-align:center;
  padding:2px 4px; background:var(--bg2); border:.5px solid var(--border2);
  border-radius:4px; color:var(--text); outline:none;
}
.num-input:focus { border-color:var(--teal2); }
.action-input {
  width:100%; font:inherit; font-size:11px;
  padding:3px 6px; background:var(--bg2); border:.5px solid var(--border2);
  border-radius:4px; color:var(--text); outline:none; min-width:120px;
}
.action-input:focus { border-color:var(--teal2); }
.inline-save-btn {
  padding:2px 8px; font:inherit; font-size:10px;
  background:var(--teal2); color:#fff; border:none; border-radius:3px; cursor:pointer;
}
.inline-save-btn:hover { background:var(--teal); }

/* ── Function Analysis Structure ── */
.fas-panel { flex:1; display:none; flex-direction:column; overflow:hidden; }
.fas-panel.active { display:flex; }
#fas-toolbar {
  display:flex; align-items:center; gap:12px; padding:8px 14px;
  background:var(--surface); border-bottom:.5px solid var(--border);
  flex-shrink:0;
}
#fas-title { font-size:12px; font-weight:500; color:var(--text2); }
#fas-controls { display:flex; align-items:center; gap:8px; margin-left:auto; }
.fas-ctrl-btn {
  padding:4px 10px; font:inherit; font-size:11px;
  background:none; border:.5px solid var(--border2); border-radius:5px;
  cursor:pointer; color:var(--text2); transition:all .12s;
}
.fas-ctrl-btn:hover { background:var(--bg2); color:var(--text); }
#fas-filter-part {
  font:inherit; font-size:11px; padding:4px 8px;
  background:var(--bg2); border:.5px solid var(--border2);
  border-radius:5px; color:var(--text);
}
#fas-body {
  flex:1; display:flex; overflow:auto; position:relative; min-height:0;
}
#fas-canvas {
  position:absolute; top:0; left:0; pointer-events:none; z-index:0;
}
#fas-left {
  width:220px; min-width:220px; flex-shrink:0;
  padding:12px 0; z-index:1; position:relative;
}
#fas-right {
  flex:1; padding:12px 0; z-index:1; position:relative; min-width:0;
}

/* Part node (left) */
.fas-part-node {
  display:flex; align-items:center; gap:6px;
  padding:5px 10px; cursor:pointer; user-select:none;
  border-left:2px solid transparent;
  transition:all .13s; position:relative;
}
.fas-part-node:hover { background:var(--bg2); }
.fas-part-node.active {
  background:var(--teal-bg); border-left-color:var(--teal2);
}
.fas-part-node.active .fpn-label { color:var(--teal); font-weight:500; }
.fpn-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.fpn-label { font-size:12px; }
.fpn-arrow {
  margin-left:auto; font-size:10px; color:var(--text3);
  transition:transform .15s; flex-shrink:0;
}
.fpn-arrow.open { transform:rotate(90deg); }

/* Function group on right */
.fas-func-group {
  margin-bottom:2px; position:relative;
}
.fas-func-header {
  display:flex; align-items:center; gap:0;
  padding:0 12px 0 8px; min-height:32px;
}
.fas-dim-tag {
  font-size:9px; font-family:var(--font-mono);
  background:var(--teal-bg); color:var(--teal);
  border:.5px solid var(--teal2); border-radius:3px;
  padding:1px 5px; flex-shrink:0; white-space:nowrap;
  margin-right:8px;
}
.fas-func-box {
  flex:1; display:flex; align-items:center; justify-content:space-between;
  padding:5px 9px; border-radius:5px; cursor:pointer; gap:6px;
  transition:all .13s; border:.5px solid transparent;
  min-width:0;
}
.fas-func-box:hover { border-color:var(--border2); }
.fas-func-box.selected {
  border-color:var(--blue2);
  background:var(--blue-bg);
}
.fas-func-box.editing {
  border-color:var(--teal2);
  background:var(--teal-bg);
}
.ffb-name {
  font-size:12px; font-weight:500; flex:1; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ffb-badges { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.ffb-type {
  font-size:9px; color:var(--text3);
  background:var(--bg3); border-radius:3px; padding:1px 5px;
}
.ffb-imp { font-size:9px; padding:1px 5px; border-radius:3px; }

/* Connector dots */
.fas-connector-dot {
  width:6px; height:6px; border-radius:50%;
  position:absolute; right:-3px; top:50%; transform:translateY(-50%);
  flex-shrink:0;
}
.fas-left-dot {
  width:6px; height:6px; border-radius:50%;
  position:absolute; left:-3px; top:50%; transform:translateY(-50%);
}

/* CR/FM tags on right edge */
.fas-right-tags {
  display:flex; flex-direction:column; gap:2px;
  margin-left:8px; flex-shrink:0;
}
.fas-tag {
  font-size:9px; padding:1px 6px; border-radius:3px; white-space:nowrap;
  font-family:var(--font-mono);
}
.fas-tag-cr { background:var(--purple-bg); color:var(--purple); border:.5px solid var(--purple2); }
.fas-tag-fm { background:var(--red-bg); color:var(--red); border:.5px solid var(--red2); }

/* Inline edit form */
.fas-edit-form {
  margin:4px 8px 4px 60px; padding:10px;
  background:var(--surface); border:.5px solid var(--teal2);
  border-radius:6px;
}
.fas-edit-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:6px; }
.fas-edit-grid4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; margin-bottom:6px; }
.fas-fld label { display:block; font-size:9px; color:var(--text3); margin-bottom:2px; text-transform:uppercase; }
.fas-fld input, .fas-fld select {
  font:inherit; font-size:11px; width:100%; padding:4px 7px;
  background:var(--bg2); border:.5px solid var(--border);
  border-radius:4px; color:var(--text); outline:none;
}
.fas-fld input:focus, .fas-fld select:focus { border-color:var(--teal2); }
.fas-edit-actions { display:flex; gap:6px; }
.btn-fas-save {
  padding:4px 12px; font:inherit; font-size:11px;
  background:var(--teal2); color:#fff; border:none; border-radius:4px; cursor:pointer;
}
.btn-fas-save:hover { background:var(--teal); }
.btn-fas-del {
  padding:4px 10px; font:inherit; font-size:11px;
  background:none; border:.5px solid var(--red2); border-radius:4px;
  cursor:pointer; color:var(--red);
}
.btn-fas-del:hover { background:var(--red-bg); }
.btn-fas-cancel {
  padding:4px 10px; font:inherit; font-size:11px;
  background:none; border:.5px solid var(--border2); border-radius:4px;
  cursor:pointer; color:var(--text2); margin-left:auto;
}
.btn-fas-cancel:hover { background:var(--bg2); }

/* Add function button */
.fas-add-func-btn {
  display:flex; align-items:center; gap:5px;
  padding:4px 10px; margin:2px 8px 2px 60px;
  font:inherit; font-size:11px; color:var(--text3);
  background:none; border:.5px dashed var(--border2);
  border-radius:4px; cursor:pointer; transition:all .12s;
}
.fas-add-func-btn:hover { color:var(--teal); border-color:var(--teal2); background:var(--teal-bg); }

/* Part section divider on right */
.fas-part-section {
  border-top:.5px solid var(--border); margin-top:4px; padding-top:4px;
}
.fas-part-section-label {
  font-size:10px; font-weight:500; color:var(--text3); padding:2px 12px 4px;
  display:flex; align-items:center; gap:6px;
}

/* scrollbar */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }

/* tooltip */
#tooltip {
  position:fixed; pointer-events:none; z-index:100;
  background:var(--surface); border:.5px solid var(--border2);
  border-radius:8px; padding:8px 12px; font-size:11px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
  max-width:240px; display:none;
}

/* notification */
#notif {
  position:fixed; top:16px; right:16px; z-index:200;
  background:var(--teal2); color:#fff; padding:8px 16px;
  border-radius:8px; font-size:12px; font-weight:500;
  transform:translateY(-60px); transition:transform .3s ease;
  pointer-events:none;
}
#notif.show { transform:translateY(0); }
</style>
</head>
<body data-theme="light">

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-mark">F</div>
      FMEA 기능 분석
    </div>
    <div id="product-selector">
      <span class="prod-badge">제품</span>
      <span id="product-name-display" onclick="openProductModal()" title="제품 전환">DD90</span>
    </div>
    <div class="header-tabs">
      <button class="htab active" onclick="switchTab('tree')">Cause &amp; Effect</button>
      <button class="htab" onclick="switchTab('fas')">기능 분석 구조도</button>
      <button class="htab" onclick="switchTab('dim')">치수 ↔ 기능</button>
      <button class="htab" onclick="switchTab('cr')">CR ↔ 부품</button>
      <button class="htab" onclick="switchTab('fm')">FM ↔ 부품</button>
      <button class="htab" onclick="switchTab('db')">DB 관리</button>
      <button class="htab" onclick="switchTab('fmea')">FMEA 전체</button>
    </div>
    <div class="header-spacer"></div>
    <div style="display:flex;align-items:center;gap:6px;margin-right:6px">
      <span id="save-status" style="font-size:11px;color:var(--text3)"></span>
      <button class="theme-btn" onclick="exportJSON()" title="JSON으로 내보내기" style="width:auto;padding:0 10px;font-size:11px;gap:4px;display:flex;align-items:center">↓ 내보내기</button>
      <label class="theme-btn" style="width:auto;padding:0 10px;font-size:11px;cursor:pointer;display:flex;align-items:center" title="JSON 파일 가져오기">
        ↑ 가져오기
        <input type="file" accept=".json" onchange="importJSON(event)" style="display:none">
      </label>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" title="다크모드 전환">◑</button>
  </header>

  <div class="main">
    <!-- Sidebar: parts tree (visible in tree + lookup tabs) -->
    <div id="sidebar">
      <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between">
        <span>부품 계층 구조</span>
        <button onclick="togglePartMgr()" title="부품 관리" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 2px;line-height:1" id="part-mgr-btn">⚙</button>
      </div>
      <div id="part-mgr" style="display:none;padding:8px 10px;border-bottom:.5px solid var(--border);background:var(--bg2)">
        <div style="font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">부품 관리</div>
        <div id="part-mgr-list"></div>
        <button onclick="showAddPartForm()" id="add-part-btn" style="width:100%;margin-top:6px;padding:5px;background:none;border:.5px dashed var(--border2);border-radius:5px;font-size:11px;color:var(--text2);cursor:pointer">+ 부품 추가</button>
        <div id="add-part-form" style="display:none;margin-top:8px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:5px">
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:2px">부품 ID *</div><input id="np-id" placeholder="P-008" style="font:inherit;font-size:11px;padding:4px 6px;background:var(--surface);border:.5px solid var(--border2);border-radius:4px;color:var(--text);width:100%"></div>
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:2px">부품명 *</div><input id="np-label" placeholder="스프링" style="font:inherit;font-size:11px;padding:4px 6px;background:var(--surface);border:.5px solid var(--border2);border-radius:4px;color:var(--text);width:100%"></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px">
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:2px">레벨</div>
              <select id="np-lv" style="font:inherit;font-size:11px;padding:4px 6px;background:var(--surface);border:.5px solid var(--border2);border-radius:4px;color:var(--text);width:100%">
                <option value="1">1 — 시스템</option><option value="2">2 — 어셈블리</option><option value="3" selected>3 — 부품</option>
              </select></div>
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:2px">색상</div>
              <select id="np-color" style="font:inherit;font-size:11px;padding:4px 6px;background:var(--surface);border:.5px solid var(--border2);border-radius:4px;color:var(--text);width:100%">
                <option value="#1D9E75">녹청 (Lv.3)</option><option value="#185FA5">파랑 (Lv.2)</option><option value="#1F3864">남색 (Lv.1)</option><option value="#7F77DD">보라</option><option value="#E24B4A">빨강</option><option value="#EF9F27">주황</option>
              </select></div>
          </div>
          <div style="display:flex;gap:5px">
            <button onclick="addPart()" style="flex:1;padding:4px;background:var(--teal2);color:#fff;border:none;border-radius:4px;font-size:11px;cursor:pointer">추가</button>
            <button onclick="cancelAddPart()" style="flex:1;padding:4px;background:none;border:.5px solid var(--border2);border-radius:4px;font-size:11px;cursor:pointer;color:var(--text2)">취소</button>
          </div>
        </div>
      </div>
      <div id="part-tree"></div>
    </div>

    <!-- Content area -->
    <div id="content">
      <!-- Tree view -->
      <div id="tab-tree" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div id="ce-toolbar">
          <span id="ce-stat"></span>
          <div style="display:flex;gap:8px;margin-left:auto;align-items:center">
            <input id="ce-search" placeholder="치수·기능·CR·FM 검색…" oninput="renderCETree()" style="height:28px;font-size:11px;width:180px">
            <select id="ce-filter-part" onchange="renderCETree()" style="height:28px;font-size:11px">
              <option value="">전체 부품</option>
            </select>
          </div>
        </div>
        <div id="ce-body">
          <div id="ce-cols">
            <div class="ce-col-hdr" style="left:0;width:160px">치수 / 공차</div>
            <div class="ce-col-hdr" style="left:170px;width:180px">기능</div>
            <div class="ce-col-hdr" style="left:360px;width:200px">고객 요구사항</div>
            <div class="ce-col-hdr" style="left:570px;width:160px">Failure Mode</div>
            <div class="ce-col-hdr" style="left:740px;width:120px">Occ / Det / RPN</div>
            <div class="ce-col-hdr" style="left:870px;width:200px">예방 / 시정 조치</div>
          </div>
          <div id="ce-content"></div>
        </div>
      </div>

      <!-- Dim lookup -->
      <div id="tab-dim" class="lookup-panel">
        <div class="lp-search">
          <select id="dim-sel" onchange="qDim()"><option value="">-- 치수 선택 --</option></select>
          <input id="dim-inp" placeholder="치수ID 또는 치수명 입력 후 Enter" onkeydown="if(event.key==='Enter')qDimTxt()">
          <button onclick="qDimTxt()">조회</button>
        </div>
        <div id="dim-out" style="flex:1;overflow-y:auto;"></div>
      </div>

      <!-- CR lookup -->
      <div id="tab-cr" class="lookup-panel">
        <div class="lp-search">
          <select id="cr-sel" onchange="qCR()"><option value="">-- CR 선택 --</option></select>
          <input id="cr-inp" placeholder="CR ID 또는 요구사항 입력 후 Enter" onkeydown="if(event.key==='Enter')qCRTxt()">
          <button onclick="qCRTxt()">조회</button>
        </div>
        <div id="cr-out" style="flex:1;overflow-y:auto;"></div>

function updatePart(i){
  const label = document.getElementById(`ep-label-${i}`).value.trim();
  if(!label){ alert('부품명은 필수입니다.'); return; }
  const newId = document.getElementById(`ep-id-${i}`).value.trim();
  const oldId = PARTS[i].id;
  if(newId !== oldId && PARTS.find((p,pi)=>p.id===newId && pi!==i)){ alert(`"${newId}"가 이미 존재합니다.`); return; }
  const sel = document.getElementById(`ep-dims-${i}`);
  const dims = Array.from(sel.selectedOptions).map(o=>o.value);
  PARTS[i] = {...PARTS[i], id:newId, label,
    lv: parseInt(document.getElementById(`ep-lv-${i}`).value),
    color: document.getElementById(`ep-color-${i}`).value,
    dims};
  editingPartIdx = -1;
  buildPartTree(); renderPartMgrList(); saveToStorage();
  if(selectedPart && selectedPart.id === oldId){ selectedPart = PARTS[i]; drawTree(PARTS[i]); }
  notify('부품이 수정되었습니다');
}

function deletePart(i){
  if(!confirm(`"${PARTS[i].label}"을 삭제하시겠습니까?\n연결 정보(DB)는 유지됩니다.`)) return;

}

/* ═══════════════════════════════════════════════════════════════
   CANVAS — Cause & Effect Tree
═══════════════════════════════════════════════════════════════ */
const canvas = document.getElementById('canvas');
const ctx = canvas ? canvas.getContext('2d') : null;
let nodes = [], edges = [];
let scrollY = 0, maxScrollY = 0;
let hoveredNode = null;
let dpr = window.devicePixelRatio||1;
let animId = null;

function resizeCanvas(){
  if(!canvas) return;
  const panel = document.getElementById('canvas-panel');
  const w = panel.clientWidth, h = panel.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function clr(v){ return getComputedStyle(document.body).getPropertyValue(v).trim(); }

const NODE_COLORS = {
  dim:  ()=>({fill:clr('--teal-bg'),  stroke:clr('--teal2'),  text:clr('--teal')}),
  spec: ()=>({fill:clr('--amber-bg'), stroke:clr('--amber2'), text:clr('--amber')}),
  func: ()=>({fill:clr('--blue-bg'),  stroke:clr('--blue2'),  text:clr('--blue')}),
  cr:   ()=>({fill:clr('--purple-bg'),stroke:clr('--purple2'),text:clr('--purple')}),
  fm:   ()=>({fill:clr('--red-bg'),   stroke:clr('--red2'),   text:clr('--red')}),
};

function rr(x,y,w,h,r){
  if(!ctx) return;
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawNode(n, hovered){
  if(!ctx) return;
  const c = NODE_COLORS[n.type]();
  ctx.save();
  rr(n.x,n.y,n.w,n.h,5);
  ctx.fillStyle = hovered ? c.stroke : c.fill; ctx.fill();
  ctx.strokeStyle = c.stroke; ctx.lineWidth = hovered?1.5:.7; ctx.stroke();
  ctx.fillStyle = hovered ? '#fff' : c.text;
  ctx.font = `500 11px IBM Plex Sans KR, sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const lines = n.lines||[n.label];
  const lh=13, sy=n.y+n.h/2-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>ctx.fillText(l,n.x+n.w/2,sy+i*lh));
  ctx.restore();
}

function drawEdge(a,b,color,dashed){
  if(!a||!b||!ctx) return;
  const x1=a.x+a.w, y1=a.y+a.h/2;
  const x2=b.x, y2=b.y+b.h/2;
  const mx=(x1+x2)/2;
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=.9;
  if(dashed) ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(x1,y1);
  ctx.bezierCurveTo(mx,y1,mx,y2,x2,y2);
  ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x2-5,y2-3); ctx.lineTo(x2-5,y2+3); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function wrapText(text,maxW){
  if(!ctx) return [text];
  ctx.font='500 11px IBM Plex Sans KR, sans-serif';
  const words=text.split(' '); const lines=[]; let cur='';
  for(const w of words){
    const t=cur?cur+' '+w:w;
    if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w;}
    else cur=t;
  }
  if(cur) lines.push(cur);
  return lines;
}

function buildNodes(part){
  if(!ctx) return;
  nodes=[]; edges=[];
  const dimIds=part.dims;
  const rows=DB.filter(r=>dimIds.includes(r.dimId));
  if(!rows.length) return;

  const C0=14, C1=142, C2=278, C3=414;
  const G=8;
  let dimY=24;
  const dimMap={}, funcMap={}, crMap={}, fmMap={};

  [...new Set(rows.map(r=>r.dimId))].forEach(dId=>{
    const d=dimById(dId);
    const lines=wrapText(d?d.name:dId,112);
    const h=Math.max(38,lines.length*13+12);
    const dn={id:'dim_'+dId,type:'dim',label:d?d.name:dId,lines,x:C0,y:dimY,w:120,h,data:{dim:d,rows:rows.filter(r=>r.dimId===dId)}};
    nodes.push(dn); dimMap[dId]=dn;
    if(d){
      const sl=`${fmt(d.nom)} +${fmt(d.tolP)}/-${fmt(d.tolM)} ${d.unit}`;
      const sn={id:'spec_'+dId,type:'spec',label:sl,lines:[sl],x:C0,y:dimY+h+G,w:120,h:30,data:{dim:d}};
      nodes.push(sn); edges.push({from:dn,to:sn,color:'#EF9F27',dashed:true});
      dimY+=h+30+G*2+6;
    } else { dimY+=h+G+6; }
  });

  let funcY=24;
  rows.forEach(r=>{
    const fKey=r.dimId+'_'+r.fId;
    if(!funcMap[fKey]){
      const lines=wrapText(r.fName,108);
      const h=Math.max(36,lines.length*13+12);
      const fn={id:'func_'+fKey,type:'func',label:r.fName,lines,x:C1,y:funcY,w:118,h,data:{row:r}};
      nodes.push(fn); funcMap[fKey]=fn;
      if(dimMap[r.dimId]) edges.push({from:dimMap[r.dimId],to:fn,color:'#378ADD',dashed:false});
      funcY+=h+G;
    } else {
      if(dimMap[r.dimId]) edges.push({from:dimMap[r.dimId],to:funcMap[fKey],color:'#378ADD',dashed:false});
    }
  });

  let crY=24;
  rows.forEach(r=>{
    const fKey=r.dimId+'_'+r.fId;
    if(!crMap[r.crId]){
      const cr=crById(r.crId);
      const label=r.crId+(cr?': '+cr.desc.substring(0,16):'');
      const lines=wrapText(label,108);
      const h=Math.max(36,lines.length*13+12);
      const cn={id:'cr_'+r.crId,type:'cr',label,lines,x:C2,y:crY,w:118,h,data:{cr}};
      nodes.push(cn); crMap[r.crId]=cn;
      crY+=h+G;
    }
    if(funcMap[fKey]&&crMap[r.crId])
      edges.push({from:funcMap[fKey],to:crMap[r.crId],color:'#7F77DD',dashed:false});
  });

  let fmY=24;
  rows.forEach(r=>{
    if(!fmMap[r.fmId]&&r.fmId){
      const fm=fmById(r.fmId);
      const label='FM: '+(fm?fm.name:r.fmId);
      const lines=wrapText(label,108);
      const h=Math.max(36,lines.length*13+12);
      const fn={id:'fm_'+r.fmId,type:'fm',label,lines,x:C3,y:fmY,w:118,h,data:{fm}};
      nodes.push(fn); fmMap[r.fmId]=fn;
      fmY+=h+G;
    }
    if(crMap[r.crId]&&fmMap[r.fmId]&&r.fmId)
      edges.push({from:crMap[r.crId],to:fmMap[r.fmId],color:'#E24B4A',dashed:true});
  });
}

function renderCanvas(){
  if(!ctx) return;
  const W=canvas.width/dpr, H=canvas.height/dpr;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=clr('--bg'); ctx.fillRect(0,0,W,H);
  drawColHeaders(W,H);
  ctx.save(); ctx.beginPath(); ctx.rect(0,30,W,H-30); ctx.clip();
  ctx.translate(0,30-scrollY);
  edges.forEach(e=>drawEdge(e.from,e.to,e.color,e.dashed));
  nodes.forEach(n=>drawNode(n,hoveredNode===n));
  ctx.restore();
  if(maxScrollY>0){
    const sbH=Math.max(28,(H-30)*(H-30)/((Math.max(...nodes.map(n=>n.y+n.h),0))+30));
    const sbY=30+(scrollY/maxScrollY)*((H-30)-sbH);
    ctx.fillStyle=clr('--bg3');
    rr(W-5,sbY,3,sbH,1.5); ctx.fill();
  }
}

function drawColHeaders(W,H){
  if(!ctx) return;
  ctx.fillStyle=clr('--surface'); ctx.fillRect(0,0,W,30);
  ctx.strokeStyle=clr('--border'); ctx.lineWidth=.5;
  ctx.beginPath(); ctx.moveTo(0,30); ctx.lineTo(W,30); ctx.stroke();
  const cols=[{x:14,w:120,lbl:'치수 / 공차'},{x:142,w:118,lbl:'기능'},{x:278,w:118,lbl:'고객 요구사항'},{x:414,w:118,lbl:'Failure Mode'}];
  ctx.font='500 10px IBM Plex Sans KR, sans-serif';
  ctx.textBaseline='middle'; ctx.textAlign='center';
  cols.forEach((c,i)=>{
    ctx.fillStyle=clr('--text3');
    ctx.fillText(c.lbl,c.x+c.w/2,15);
    if(i>0){
      ctx.strokeStyle=clr('--border'); ctx.lineWidth=.5;
      ctx.beginPath(); ctx.moveTo(c.x-4,4); ctx.lineTo(c.x-4,26); ctx.stroke();
    }
  });
}

function drawPlaceholder(){
  if(!ctx) return;
  const W=canvas.width/dpr,H=canvas.height/dpr;
  ctx.fillStyle=clr('--bg'); ctx.fillRect(0,0,W,H);
  drawColHeaders(W,H);
  ctx.fillStyle=clr('--text3'); ctx.font='13px IBM Plex Sans KR,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('왼쪽 트리에서 부품을 선택하세요',W/2,(H+30)/2);
}

function drawTree(part){
  if(!ctx) return;
  scrollY=0; selectedNode=null;
  buildNodes(part);
  const contentH=Math.max(...nodes.map(n=>n.y+n.h),0)+40;
  const H=canvas.height/dpr;
  maxScrollY=Math.max(0,contentH-(H-30));
  renderCanvas();
}

/* canvas events */
if(canvas){
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  scrollY=Math.max(0,Math.min(maxScrollY,scrollY+e.deltaY*.5));
  if(selectedPart||nodes.length) renderCanvas();
},{passive:false});

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top+scrollY-30;
  const prev=hoveredNode;
  hoveredNode=nodes.find(n=>mx>=n.x&&mx<=n.x+n.w&&my>=n.y&&my<=n.y+n.h)||null;
  canvas.style.cursor=hoveredNode?'pointer':'default';
  if(hoveredNode!==prev) renderCanvas();
  if(hoveredNode) showTooltip(e.clientX,e.clientY,hoveredNode);
  else hideTooltip();
});

canvas.addEventListener('mouseleave',()=>{ hideTooltip(); hoveredNode=null; renderCanvas(); });

canvas.addEventListener('click',()=>{
  if(!hoveredNode) return;
  selectedNode=hoveredNode;
  renderDetailNode(hoveredNode);
  const dp=document.getElementById('detail-panel');
  if(dp.style.display==='none') dp.style.display='flex';
});

function showTooltip(x,y,n){
  const t=document.getElementById('tooltip');
  let txt='';
  if(n.type==='dim'&&n.data.dim){ const d=n.data.dim; txt=`${d.name}<br><small>${d.part} · ${d.type}</small>`; }
  else if(n.type==='spec'&&n.data.dim){ txt=`공칭: ${fmt(n.data.dim.nom)} ${n.data.dim.unit}<br>공차: +${fmt(n.data.dim.tolP)} / -${fmt(n.data.dim.tolM)}`; }
  else if(n.type==='func'&&n.data.row){ txt=`${n.data.row.fName}<br><small>${n.data.row.fDesc||''}</small>`; }
  else if(n.type==='cr'&&n.data.cr){ txt=`${n.data.cr.id}<br>${n.data.cr.desc}<br><small>${n.data.cr.criteria||''}</small>`; }
  else if(n.type==='fm'&&n.data.fm){ txt=`${n.data.fm.name}<br>심각도: ${n.data.fm.sev}<br><small>${n.data.fm.desc||''}</small>`; }
  if(!txt) return;
  t.innerHTML=txt; t.style.display='block';
  t.style.left=Math.min(x+12,window.innerWidth-260)+'px';
  t.style.top=(y+12)+'px';
}
function hideTooltip(){ document.getElementById('tooltip').style.display='none'; }

let showForms={conn:false,dims:false,crs:false,fms:false};

function renderDBSub(t){
  /* t가 생략되면 현재 활성 서브탭을 다시 그린다 */
  if(!t) t = currentDB;
  currentDB = t;

  /* 서브탭 버튼 active 동기화 */
  document.querySelectorAll('.dstab').forEach((b,i)=>{
    b.classList.toggle('active', ['conn','dims','crs','fms'][i] === t);
  });

  /* tab-db가 현재 활성 탭이 아니어도 콘텐츠는 갱신 (탭 전환 시 최신 상태 유지) */
  const el = document.getElementById('db-sub-content');
  if(!el) return;

  /* HTML 빌드 */
  let html = '';
  if(t==='conn')      html = buildConnHTML();
  else if(t==='dims') html = buildDimsHTML();
  else if(t==='crs')  html = buildCRsHTML();
  else if(t==='fms')  html = buildFMsHTML();

  /* innerHTML 직접 세팅 → 즉시 DOM 반영 */
  el.innerHTML = html;

  if(t==='conn' && showForms.conn) setTimeout(fillConnDim, 10);
}

function ecFillDim(){
  const id=document.getElementById('ec-dim')?.value;
  const d=dimById(id); if(!d) return;
}

function updateConn(i){
  const dimId=document.getElementById('ec-dim').value;
  const fName=document.getElementById('ec-fn').value.trim();
  const crId=document.getElementById('ec-cr').value;
  if(!dimId||!fName||!crId){ alert('치수, 기능명, CR ID는 필수입니다.'); return; }
  const ec_occ = parseInt(document.getElementById('ec-occ')?.value)||0;
  const ec_det = parseInt(document.getElementById('ec-det')?.value)||0;
  DB[i]={...DB[i],dimId,fId:document.getElementById('ec-fid').value.trim(),fName,
    fDesc:document.getElementById('ec-fd').value.trim(),
    fType:document.getElementById('ec-ft').value.trim(),
    crId,imp:document.getElementById('ec-imp').value,
    std:document.getElementById('ec-std').value.trim(),
    fmId:document.getElementById('ec-fm').value,
    occ:ec_occ||undefined, det:ec_det||undefined,
    prevAction:document.getElementById('ec-prev')?.value.trim()||undefined,
    corrAction:document.getElementById('ec-corr')?.value.trim()||undefined,
    detMethod:document.getElementById('ec-detmethod')?.value.trim()||undefined,
  };
  editingConn=-1;
  if(selectedPart) drawTree(selectedPart);
  renderDBSub('conn'); renderCETree(); if(currentTab==='fmea') renderFMEATable(); notify('연결이 수정되었습니다'); saveToStorage();
}

function fillConnDim(){
  const id=document.getElementById('cf-dim')?.value;
  const d=dimById(id); if(!d) return;
  document.getElementById('cf-did').value=d.id;
  document.getElementById('cf-spec').value=`${fmt(d.nom)} +${fmt(d.tolP)}/-${fmt(d.tolM)}`;
  document.getElementById('cf-ut').value=`${d.unit} / ${d.type}`;
  document.getElementById('cf-part').value=d.part;
  document.getElementById('cf-mat').value=d.mat;
}

function saveConn(){
  const dimId=document.getElementById('cf-dim').value;
  const fName=document.getElementById('cf-fn').value.trim();
  const crId=document.getElementById('cf-cr').value;
  if(!dimId||!fName||!crId){ alert('치수, 기능명, CR ID는 필수입니다.'); return; }
  const cf_occ = parseInt(document.getElementById('cf-occ')?.value)||0;
  const cf_det = parseInt(document.getElementById('cf-det')?.value)||0;
  DB.push({dimId,fId:document.getElementById('cf-fid').value.trim(),fName,
    fDesc:document.getElementById('cf-fd').value.trim(),
    fType:document.getElementById('cf-ft').value.trim(),
    crId,imp:document.getElementById('cf-imp').value,
    std:document.getElementById('cf-std').value.trim(),
    fmId:document.getElementById('cf-fm').value,
    occ:cf_occ||undefined, det:cf_det||undefined,
    prevAction:document.getElementById('cf-prev')?.value.trim()||undefined,
    corrAction:document.getElementById('cf-corr')?.value.trim()||undefined,
    detMethod:document.getElementById('cf-detmethod')?.value.trim()||undefined,
  });
  showForms.conn=false;
  if(selectedPart) drawTree(selectedPart);
  renderDBSub('conn'); renderCETree(); if(currentTab==='fmea') renderFMEATable(); notify('연결이 추가되었습니다'); saveToStorage();
}

function delConn(i){
  if(!confirm('삭제하시겠습니까?')) return;
  DB.splice(i,1);
  if(selectedPart) drawTree(selectedPart);
  renderDBSub('conn'); renderCETree(); if(currentTab==='fmea') renderFMEATable(); notify('삭제되었습니다'); saveToStorage();
}

function updateDim(i){
  const name=document.getElementById('edd-name').value.trim();
  const part=document.getElementById('edd-part').value.trim();
  const nom=parseFloat(document.getElementById('edd-nom').value);
  const tolP=parseFloat(document.getElementById('edd-tolp').value)||0;
  const tolM=parseFloat(document.getElementById('edd-tolm').value)||0;
  const unit=document.getElementById('edd-unit').value.trim();
  if(!name||!part||isNaN(nom)||!unit){ alert('치수명, 부품명, 공칭값, 단위는 필수입니다.'); return; }
  const newId=document.getElementById('edd-id').value.trim();
  const oldId=DIMS[i].id;
  if(newId!==oldId && DIMS.find((d,idx)=>d.id===newId&&idx!==i)){ alert(`"${newId}"가 이미 존재합니다.`); return; }
  // ID 변경 시 DB 연결도 업데이트
  if(newId!==oldId){ DB.forEach(r=>{ if(r.dimId===oldId) r.dimId=newId; }); }
  DIMS[i]={...DIMS[i],id:newId,name,part,pid:document.getElementById('edd-pid').value.trim(),
    nom,tolP,tolM,unit,type:document.getElementById('edd-type').value,
    mat:document.getElementById('edd-mat').value.trim(),lv:parseInt(document.getElementById('edd-lv').value)};
  editingDim=-1; rebuildSelects(); buildPartTree(); renderDBSub('dims');
  if(selectedPart) drawTree(selectedPart);
  notify('치수가 수정되었습니다'); saveToStorage();
}

function saveDim(){
  const id=document.getElementById('dd-id').value.trim();
  const name=document.getElementById('dd-name').value.trim();
  const part=document.getElementById('dd-part').value.trim();
  const nom=parseFloat(document.getElementById('dd-nom').value);
  const tolP=parseFloat(document.getElementById('dd-tolp').value)||0;
  const tolM=parseFloat(document.getElementById('dd-tolm').value)||0;

  if(!id||!name||!part||isNaN(nom)||!unit){ alert('ID, 치수명, 부품명, 공칭값, 단위는 필수입니다.'); return; }

function delDim(i){

let fasExpandedParts = new Set();   // part IDs that are expanded
let fasSelectedFunc = null;         // {dimId, fId} of selected func
let fasEditingFunc = null;          // {dimId, fId} being edited
let fasAddingToPart = null;         // part ID for new func

function renderFAS(){
  // Build part filter dropdown
  const sel = document.getElementById('fas-filter-part');
  if(sel){
    const prev = sel.value;
    sel.innerHTML = '<option value="">전체 부품</option>' +
      PARTS.map(p=>`<option value="${p.id}">${p.label}</option>`).join('');
    sel.value = prev;
  }

  const filterPart = document.getElementById('fas-filter-part')?.value || '';
  const partsToShow = filterPart ? PARTS.filter(p=>p.id===filterPart) : PARTS;

  // ── Left column: part hierarchy ──
  const left = document.getElementById('fas-left');
  left.innerHTML = partsToShow.map(p=>{
    const cnt = DB.filter(r=>p.dims.includes(r.dimId)).length;
    const isOpen = fasExpandedParts.has(p.id);
    return `<div class="fas-part-node${fasExpandedParts.has(p.id)||filterPart?' active':''}"
      id="fas-pnode-${p.id}"
      style="padding-left:${8+(p.lv-1)*12}px"
      onclick="fasPToggle('${p.id}')">
      <span class="fpn-dot" style="background:${p.color}"></span>
      <span class="fpn-label">${p.label}</span>
      ${cnt?`<span style="font-size:9px;color:var(--text3);background:var(--bg3);padding:1px 5px;border-radius:99px;margin-right:4px">${cnt}</span>`:''}
      <span class="fpn-arrow${isOpen||filterPart?' open':''}">▶</span>
    </div>`;
  }).join('');

  // ── Right column: functions ──
  const right = document.getElementById('fas-right');
  let rightHTML = '';

  partsToShow.forEach((p, pi)=>{
    const isOpen = fasExpandedParts.has(p.id) || !!filterPart;
    const partRows = buildFASRows(p);

    rightHTML += `<div class="fas-part-section" id="fas-rsec-${p.id}" style="${pi===0?'border-top:none;margin-top:0;padding-top:0':''}">`;
    rightHTML += `<div class="fas-part-section-label">
      <span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block"></span>
      <span>${p.label}</span>
      ${!isOpen?`<span style="color:var(--text3);font-weight:400">(클릭하여 펼치기)</span>`:''}
    </div>`;

    if(isOpen){

function buildFASRows(p){
  // Collect all DB rows for this part, deduplicate by dimId+fId
  const rows = [];
  const seen = new Set();
  p.dims.forEach(dId=>{
    DB.filter(r=>r.dimId===dId).forEach(r=>{
      const key = r.dimId+'__'+r.fId;
      if(!seen.has(key)){ seen.add(key); rows.push(r); }
    });
  });
  return rows;
}

function fasPToggle(pid){
  if(fasExpandedParts.has(pid)) fasExpandedParts.delete(pid);
  else fasExpandedParts.add(pid);
  fasEditingFunc = null; fasAddingToPart = null;
  renderFAS();
}

function fasExpandAll(){
  PARTS.forEach(p=>fasExpandedParts.add(p.id));
  renderFAS();
}
function fasCollapseAll(){
  fasExpandedParts.clear();
  renderFAS();
}

function fasFuncClick(dimId, fId){
  if(fasEditingFunc && fasEditingFunc.dimId===dimId && fasEditingFunc.fId===fId){
    // toggle off
    fasEditingFunc = null; fasSelectedFunc = null;
  } else {
    fasSelectedFunc = {dimId, fId};
    fasEditingFunc = {dimId, fId};
  }
  renderFAS();
}

function fasSaveEdit(){
  if(!fasEditingFunc) return;
  const {dimId, fId} = fasEditingFunc;
  const fName = document.getElementById('fe-fname')?.value.trim();
  if(!fName){ alert('기능명은 필수입니다.'); return; }
  const newDimId = document.getElementById('fe-dim')?.value;
  const idx = DB.findIndex(r=>r.dimId===dimId && r.fId===fId);
  if(idx >= 0){
    DB[idx] = {...DB[idx],
      dimId: newDimId || dimId,
      fId: document.getElementById('fe-fid')?.value.trim() || fId,
      fName,
      fDesc: document.getElementById('fe-fdesc')?.value.trim() || '',
      fType: document.getElementById('fe-ftype')?.value || '',
      crId: document.getElementById('fe-cr')?.value || '',
      imp: document.getElementById('fe-imp')?.value || '필수',
      fmId: document.getElementById('fe-fm')?.value || '',
      std: document.getElementById('fe-std')?.value.trim() || '',
    };
  }
  fasEditingFunc = null; fasSelectedFunc = null;
  if(selectedPart) drawTree(selectedPart);
  renderFAS(); notify('기능이 수정되었습니다'); saveToStorage();
}

function fasDeleteFunc(){
  if(!fasEditingFunc) return;
  const {dimId, fId} = fasEditingFunc;
  const row = DB.find(r=>r.dimId===dimId && r.fId===fId);
  if(!confirm(`"${row?.fName||fId}" 기능을 삭제하시겠습니까?`)) return;
  const idx = DB.findIndex(r=>r.dimId===dimId && r.fId===fId);
  if(idx >= 0) DB.splice(idx,1);
  fasEditingFunc = null; fasSelectedFunc = null;
  if(selectedPart) drawTree(selectedPart);
  renderFAS(); notify('기능이 삭제되었습니다'); saveToStorage();
}

function fasStartAddFunc(pid){
  fasAddingToPart = pid;
  fasEditingFunc = null; fasSelectedFunc = null;
  fasExpandedParts.add(pid);
  renderFAS();
  setTimeout(()=>{
    const el = document.getElementById('fna-fname');
    if(el) el.focus();
  }, 50);
}

function fasAddNewFunc(pid){
  const p = PARTS.find(pp=>pp.id===pid);
  const dimId = document.getElementById('fna-dim')?.value;
  const fName = document.getElementById('fna-fname')?.value.trim();
  if(!dimId || !fName){ alert('치수와 기능명은 필수입니다.'); return; }
  const fId = document.getElementById('fna-fid')?.value.trim() ||
    ('F-' + String(DB.length+1).padStart(3,'0'));
  DB.push({
    dimId, fId, fName,
    fDesc: document.getElementById('fna-fdesc')?.value.trim() || '',
    fType: document.getElementById('fna-ftype')?.value || '',
    crId:  document.getElementById('fna-cr')?.value || '',
    imp:   document.getElementById('fna-imp')?.value || '필수',
    fmId:  document.getElementById('fna-fm')?.value || '',
    std:   document.getElementById('fna-std')?.value.trim() || '',
  });
  fasAddingToPart = null;
  if(selectedPart) drawTree(selectedPart);
  rebuildSelects(); renderFAS(); notify('기능이 추가되었습니다'); saveToStorage();
}

function drawFASLines(partsToShow){
  const body = document.getElementById('fas-body');
  const left = document.getElementById('fas-left');
  const right = document.getElementById('fas-right');
  const cvs = document.getElementById('fas-canvas');
  if(!cvs || !body) return;

  const bw = body.scrollWidth, bh = body.scrollHeight;
  cvs.width = bw; cvs.height = bh;
  cvs.style.width = bw+'px'; cvs.style.height = bh+'px';

  const ctx2 = cvs.getContext('2d');
  ctx2.clearRect(0, 0, bw, bh);

  const isDk = isDark();
  const lineColor = isDk ? 'rgba(90,88,85,.6)' : 'rgba(0,0,0,.12)';
  const activeColor = isDk ? '#5DCAA5' : '#1D9E75';

  partsToShow.forEach(p=>{
    const pNode = document.getElementById('fas-pnode-'+p.id);
    const sec   = document.getElementById('fas-rsec-'+p.id);
    if(!pNode || !sec) return;

    const isOpen = fasExpandedParts.has(p.id) || !!document.getElementById('fas-filter-part')?.value;

    const pRect = pNode.getBoundingClientRect();
    const bRect = body.getBoundingClientRect();
    const sRect = sec.getBoundingClientRect();

    const px = pRect.right - bRect.left + body.scrollLeft;
    const py = pRect.top + pRect.height/2 - bRect.top + body.scrollTop;

    if(!isOpen){
      // collapsed: single line to section label
      const lx = sRect.left - bRect.left + body.scrollLeft;
      const ly = sRect.top + 16 - bRect.top + body.scrollTop;
      ctx2.strokeStyle = lineColor; ctx2.lineWidth = 1;
      ctx2.setLineDash([3,3]);
      ctx2.beginPath(); ctx2.moveTo(px, py);
      ctx2.bezierCurveTo(px+30, py, lx-30, ly, lx, ly);
      ctx2.stroke(); ctx2.setLineDash([]);
      return;
    }

    // expanded: lines to each function box
    const rows = buildFASRows(p);
    rows.forEach(row=>{
      const fg = document.getElementById(`fas-fg-${row.dimId}-${row.fId}`);
      if(!fg) return;
      const fRect = fg.getBoundingClientRect();
      const fx = fRect.left - bRect.left + body.scrollLeft;
      const fy = fRect.top + fRect.height/2 - bRect.top + body.scrollTop;

      const isActive = fasSelectedFunc &&
        fasSelectedFunc.dimId===row.dimId && fasSelectedFunc.fId===row.fId;

      ctx2.strokeStyle = isActive ? activeColor : lineColor;
      ctx2.lineWidth = isActive ? 1.5 : 1;
      ctx2.setLineDash([]);
      ctx2.beginPath();
      ctx2.moveTo(px, py);
      ctx2.bezierCurveTo(px+40, py, fx-40, fy, fx, fy);
      ctx2.stroke();

      // dot at right end of part node
      ctx2.fillStyle = isActive ? activeColor : lineColor;
      ctx2.beginPath();
      ctx2.arc(px, py, 3, 0, Math.PI*2);
      ctx2.fill();

      // dot at left end of func box
      ctx2.beginPath();
      ctx2.arc(fx, fy, 3, 0, Math.PI*2);
      ctx2.fill();
    });
  });
}

// Re-draw lines on scroll
document.getElementById('fas-body')?.addEventListener('scroll', ()=>{
  if(currentTab === 'fas'){
    const filterPart = document.getElementById('fas-filter-part')?.value || '';
    const partsToShow = filterPart ? PARTS.filter(p=>p.id===filterPart) : PARTS;
    drawFASLines(partsToShow);
  }
});


/* ═══════════════════════════════════════════════════════════════
   CAUSE & EFFECT TREE — HTML 기반 전체 자동 표시
═══════════════════════════════════════════════════════════════ */
let ceCollapsed = new Set();   /* 접힌 부품 ID Set */

function renderCETree(){
  const content = document.getElementById('ce-content');
  const stat    = document.getElementById('ce-stat');
  const filterSel = document.getElementById('ce-filter-part');
  const search  = (document.getElementById('ce-search')?.value||'').trim().toLowerCase();
  if(!content) return;

  /* ── 부품 필터 드롭다운 갱신 ── */
  if(filterSel){
    const prev = filterSel.value;
    /* DB에 실제로 연결이 있는 부품만 드롭다운에 표시 */
    const usedPartLabels = new Set(
      DB.map(r=>{ const d=dimById(r.dimId); return d?d.part:''; }).filter(Boolean)
    );
    /* PARTS 목록 + DB에만 있는 부품(PARTS에 없는 경우) 통합 */
    const partOptions = PARTS.filter(p=>
      p.dims.some(dId=>DB.some(r=>r.dimId===dId)) ||
      [...usedPartLabels].some(lbl=>lbl===p.label)
    );
    filterSel.innerHTML = '<option value="">전체 부품</option>' +
      partOptions.map(p=>`<option value="${p.id}">${p.label}</option>`).join('');
    filterSel.value = (partOptions.find(p=>p.id===prev) ? prev : '');
  }
  const filterPart = filterSel?.value || '';

  /* ── DB 전체 rows를 부품별로 그룹핑 (PARTS.dims 무관) ── */
  /* 각 DB row → dimById → dim.part 로 부품 파악 */
  /* PARTS에서 label 매칭 → 없으면 "기타" 섹션 */

  /* 검색 필터 먼저 적용 */
  const hl = (txt) => {
    if(!search||!txt) return txt||'';
    const lc=txt.toLowerCase(), idx=lc.indexOf(search);
    if(idx<0) return txt;
    return txt.slice(0,idx)+'<mark class="ce-highlight">'+txt.slice(idx,idx+search.length)+'</mark>'+txt.slice(idx+search.length);
  };

  const allRows = search ? DB.filter(r=>{
    const d=dimById(r.dimId);
    return (d?.name||'').toLowerCase().includes(search)||
           r.dimId.toLowerCase().includes(search)||
           r.fName.toLowerCase().includes(search)||
           r.crId.toLowerCase().includes(search)||
           (crById(r.crId)?.desc||'').toLowerCase().includes(search)||
           (r.fmId||'').toLowerCase().includes(search)||
           (fmById(r.fmId)?.name||'').toLowerCase().includes(search)||
           (d?.part||'').toLowerCase().includes(search);
  }) : DB;

  /* 부품명 → PARTS 매핑 테이블 (label 기준) */
  const partByLabel = {};
  PARTS.forEach(p=>{ partByLabel[p.label]=p; });

  /* DB rows를 부품명 기준으로 그룹핑 */
  const groupMap = {}; /* partKey → { part, rows[] } */
  const partOrder = []; /* 순서 유지 */

  allRows.forEach(r=>{
    const d = dimById(r.dimId);
    const partLabel = d?.part || '기타 (부품 미지정)';
    const matchedPart = partByLabel[partLabel];
    const partKey = matchedPart ? matchedPart.id : ('_'+partLabel);

    /* 부품 필터 적용 */
    if(filterPart && matchedPart?.id !== filterPart) return;

    if(!groupMap[partKey]){
      groupMap[partKey] = {
        id: partKey,
        label: matchedPart ? matchedPart.label : partLabel,
        color: matchedPart ? matchedPart.color : '#888780',
        rows: []
      };
      partOrder.push(partKey);
    }
    groupMap[partKey].rows.push(r);
  });

  let html = '';
  let totalRows = 0;

  partOrder.forEach(partKey=>{
    const grp = groupMap[partKey];
    const rows = grp.rows;
    if(!rows.length) return;

    const isOpen = !ceCollapsed.has(partKey);
    totalRows += rows.length;

    html += `<div class="ce-part-section" id="ce-sec-${partKey}">`;
    html += `<div class="ce-part-label" onclick="cePToggle('${partKey}')">
      <span class="ce-part-dot" style="background:${grp.color}"></span>
      <span>${grp.label}</span>
      <span class="ce-part-cnt">${rows.length}건</span>
      <span class="ce-part-arrow${isOpen?' open':''}">▶</span>
    </div>`;

    if(isOpen){
      /* 치수 ID 기준으로 그룹핑 */
      const dimIds = [...new Set(rows.map(r=>r.dimId))];
      dimIds.forEach(dId=>{
        const dimRows = rows.filter(r=>r.dimId===dId);
        const d = dimById(dId);
        const specStr = d ? `${fmt(d.nom)} +${fmt(d.tolP)}/-${fmt(d.tolM)} ${d.unit}` : '';

        dimRows.forEach((r, ri)=>{
          const cr = crById(r.crId);
          const fm = fmById(r.fmId);
          const sev = fm?.sev||0;
          const sevC = sev>=9?'var(--red)':sev>=6?'var(--amber)':'var(--teal)';
          const showDim = ri===0;

          html += `<div class="ce-row" id="ce-row-${r.dimId}-${r.fId||ri}">`;

          /* ── 치수 셀 ── */
          html += `<div class="ce-cell ce-cell-dim" style="${!showDim?'border-top:none;background:var(--bg2)':''}">`;
          if(showDim){
            html += `<span class="ce-dim-id">${r.dimId}</span>
              <span class="ce-dim-name">${hl(d?.name||r.dimId)}</span>
              ${specStr?`<span class="ce-dim-spec">${specStr}</span>`:''}`;
          }
          html += `</div>`;

          /* ── 기능 셀 ── */
          html += `<div class="ce-cell ce-cell-func">
            <div class="ce-func-box" onclick="ceFuncClick('${r.dimId}','${r.fId||''}')">
              <div class="ce-func-name">${hl(r.fName)}</div>
              ${r.fType?`<div class="ce-func-type">${r.fType}</div>`:''}
            </div>
          </div>`;

          /* ── CR 셀 ── */
          html += `<div class="ce-cell ce-cell-cr">`;
          if(r.crId){
            html += `<span class="ce-cr-id" onclick="jumpCR('${r.crId}')">${r.crId}</span>
              <span class="ce-cr-desc">${hl(cr?.desc||r.crId)}</span>
              ${r.imp?`<span class="badge b-${r.imp} ce-cr-imp">${r.imp}</span>`:''}`;
          } else {
            html += `<span style="font-size:10px;color:var(--text3)">—</span>`;
          }
          html += `</div>`;

          /* ── FM 셀 ── */
          html += `<div class="ce-cell ce-cell-fm">`;
          if(r.fmId && fm){
            html += `<div class="ce-fm-box" onclick="jumpFM('${r.fmId}')">
              <div class="ce-fm-id">${r.fmId}</div>
              <div class="ce-fm-name">${hl(fm.name)}</div>
              ${sev?`<div class="ce-fm-sev" style="color:${sevC}">심각도 ${sev}</div>`:''}
            </div>`;
          } else {
            html += `<span style="font-size:10px;color:var(--text3)">—</span>`;
          }
          html += `</div>`;

          /* ── RPN 셀 ── */
          const fm_ce=fmById(r.fmId); const sev_ce=fm_ce?.sev||0;
          const occ_ce=r.occ||0; const det_ce=r.det||0;
          const rpn_ce=sev_ce&&occ_ce&&det_ce?sev_ce*occ_ce*det_ce:0;
          const rpnC_ce=rpn_ce>=200?'rpn-hi':rpn_ce>=100?'rpn-md':rpn_ce>0?'rpn-lo':'rpn-na';
          const odC_ce=(v)=>v>=8?'od-hi':v>=5?'od-md':v>0?'od-lo':'';
          html += `<div class="ce-cell ce-cell-rpn">
            <div class="ce-rpn-row"><span class="ce-rpn-label">Occ</span><span class="occ-det-badge ${odC_ce(occ_ce)}">${occ_ce||'—'}</span></div>
            <div class="ce-rpn-row"><span class="ce-rpn-label">Det</span><span class="occ-det-badge ${odC_ce(det_ce)}">${det_ce||'—'}</span></div>
            <div class="ce-rpn-row"><span class="ce-rpn-label">RPN</span><span class="rpn-badge ${rpnC_ce}">${rpn_ce||'—'}</span></div>
          </div>`;

          /* ── 조치 셀 ── */
          html += `<div class="ce-cell" style="width:200px;flex-direction:column;align-items:flex-start;gap:3px;">
            ${r.prevAction?`<div style="font-size:10px"><span style="font-size:9px;color:var(--purple);font-weight:500;margin-right:3px">예방</span>${r.prevAction}</div>`:''}
            ${r.corrAction?`<div style="font-size:10px"><span style="font-size:9px;color:var(--red);font-weight:500;margin-right:3px">시정</span>${r.corrAction}</div>`:''}
            ${r.detMethod?`<div style="font-size:10px"><span style="font-size:9px;color:var(--text3);font-weight:500;margin-right:3px">검출</span>${r.detMethod}</div>`:''}
            ${!r.prevAction&&!r.corrAction&&!r.detMethod?'<span style="font-size:10px;color:var(--text3)">—</span>':''}
          </div>`;

          html += `</div>`; /* ce-row */
        });
      });
    }
    html += `</div>`; /* ce-part-section */
  });

  if(!html){
    html = `<div class="ce-empty">${search?`"${search}"에 일치하는 연결이 없습니다`:'DB에 등록된 연결이 없습니다<br><span style="font-size:11px">DB 관리 탭에서 연결을 추가하세요</span>'}</div>`;
  }

  content.innerHTML = html;
  if(stat) stat.textContent = `총 ${totalRows}건의 연결`;
}

const PRODUCT_LIST_KEY = 'fmea_product_list_v1';
const PRODUCT_DATA_PREFIX = 'fmea_prod_';

/* 기본 제품 구조 */
function emptyProductData(){
  return { DIMS:[], CRS:[], FMS:[], DB:[], PARTS:[] };
}

/* 제품 목록 로드 */
function loadProductList(){
  try {
    const raw = localStorage.getItem(PRODUCT_LIST_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  /* 기본값: DD90 제품 하나 */
  return [{
    id: 'DD90',
    code: 'DD90',
    name: 'DD90 Driving Module',
    desc: '현재 개발 중인 Sub Assy',
    parentId: null,
    color: '#1D9E75',
    createdAt: new Date().toISOString()
  }];
}

function saveProductList(list){
  localStorage.setItem(PRODUCT_LIST_KEY, JSON.stringify(list));
}

/* 현재 제품 ID */
let currentProductId = (()=>{
  const list = loadProductList();
  const saved = localStorage.getItem('fmea_current_product');
  if(saved && list.find(p=>p.id===saved)) return saved;
  return list[0]?.id || 'DD90';
})();

/* 제품 데이터 저장/로드 */
function saveProductData(productId, data){
  localStorage.setItem(PRODUCT_DATA_PREFIX + productId, JSON.stringify(data));
}

function loadProductData(productId){
  try {
    const raw = localStorage.getItem(PRODUCT_DATA_PREFIX + productId);
    if(raw){
      const data = JSON.parse(raw);
      return data;
    }
  } catch(e){}
  return null;
}

/* 제품 전환 */
function switchProduct(productId){
  /* 현재 제품 저장 */
  saveProductData(currentProductId, { DIMS, CRS, FMS, DB, PARTS, savedAt: new Date().toISOString() });

  /* 새 제품 로드 */
  currentProductId = productId;
  localStorage.setItem('fmea_current_product', productId);

  const data = loadProductData(productId);
  if(data){
    if(data.DIMS)  DIMS  = data.DIMS;
    if(data.CRS)   CRS   = data.CRS;
    if(data.FMS)   FMS   = data.FMS;
    if(data.DB)    DB    = data.DB;
    if(data.PARTS) PARTS = data.PARTS;
  } else {
    DIMS=[]; CRS=[]; FMS=[]; DB=[]; PARTS=[];
  }

  /* ── 모든 UI 상태 초기화 ── */
  showForms       = {conn:false, dims:false, crs:false, fms:false};
  editingConn     = -1;
  editingDim      = -1;
  editingCR       = -1;
  editingFM       = -1;
  editingPartIdx  = -1;
  fasEditingFunc  = null;
  fasSelectedFunc = null;
  fasAddingToPart = null;
  ceCollapsed.clear();
  fasExpandedParts.clear();
  selectedPart    = null;
  selectedNode    = null;
  hoveredNode     = null;
  scrollY         = 0;
  currentDetail   = 'info';

  /* 제품명 헤더 갱신 */
  updateProductDisplay();

  /* UI 전체 갱신 */
  buildPartTree();
  rebuildSelects();
  renderCETree();
  if(currentTab==='db')   renderDBSub(currentDB);
  if(currentTab==='fas')  renderFAS();
  if(currentTab==='fmea') renderFMEATable();

  closeProductModal();
  notify(`제품 전환: ${getProductById(productId)?.code || productId}`);
}

function getProductById(id){
  return loadProductList().find(p=>p.id===id);
}

function updateProductDisplay(){
  const prod = getProductById(currentProductId);
  const el = document.getElementById('product-name-display');
  if(el) el.textContent = prod ? (prod.code + (prod.name?' — '+prod.name:'')) : currentProductId;
  document.title = `FMEA — ${prod?.code||currentProductId}`;
}

function buildColorPalette(containerId, inputId, selectedColor){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = PROD_COLORS.map(col=>
    `<div class="color-swatch${col===selectedColor?' selected':''}"
      style="background:${col}" onclick="selectColor('${containerId}','${inputId}','${col}')"></div>`

function selectColor(palId, inputId, color){
  document.getElementById(inputId).value = color;

/* 제품 목록 렌더링 */
function renderProductList(){
  const list = loadProductList();
  const el = document.getElementById('prod-list');
  if(!el) return;

  /* 부모 선택 드롭다운 갱신 */
  const parentSel = document.getElementById('np-parent');
  if(parentSel){
    parentSel.innerHTML = '<option value="">최상위 제품 (독립)</option>' +
      list.map(p=>`<option value="${p.id}">${p.code} — ${p.name||''}</option>`).join('');
  }
  buildColorPalette('np-color-palette','np-color','#1D9E75');

  if(!list.length){ el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">등록된 제품이 없습니다</div>'; return; }

  /* 계층 구조로 정렬 */
  const roots = list.filter(p=>!p.parentId);
  const children = (pid) => list.filter(p=>p.parentId===pid);

  function renderItem(p, depth){
    const data = loadProductData(p.id);
    const dbCount = data?.DB?.length || 0;
    const dimCount = data?.DIMS?.length || 0;
    const isActive = p.id === currentProductId;
    return `<div class="prod-item${isActive?' active':''}"
      style="margin-left:${depth*16}px;cursor:default"
      id="prod-item-${p.id}">
      <div class="prod-item-icon" style="background:${p.color}">${p.code.substring(0,3)}</div>
      <div class="prod-item-info">
        <div class="prod-item-name">${p.code}${p.name?' — '+p.name:''}</div>
        <div class="prod-item-meta">${p.desc||''}${p.desc&&dbCount?' · ':''}${dbCount?`연결 ${dbCount}건`:''} ${dimCount?`/ 치수 ${dimCount}개`:''}</div>
      </div>
      <div class="prod-item-actions">
        ${!isActive?`<button class="prod-act-btn" onclick="switchProduct('${p.id}')">전환</button>`
                   :`<span style="font-size:10px;color:var(--teal);font-weight:500">현재</span>`}
        <button class="prod-act-btn" onclick="editProduct('${p.id}')">수정</button>
        <button class="prod-act-btn danger" onclick="deleteProduct('${p.id}')">삭제</button>
      </div>
    </div>
    ${children(p.id).map(ch=>renderItem(ch, depth+1)).join('')}`;
  }

  el.innerHTML = roots.map(p=>renderItem(p,0)).join('');
}

function toggleAddProdForm(){
  const form = document.getElementById('add-prod-form');
  const btn  = document.getElementById('show-add-prod-btn');
  const open = form.style.display==='none';
  form.style.display = open ? 'block' : 'none';
